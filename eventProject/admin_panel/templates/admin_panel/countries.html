<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countries — EventHub Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <link href="/static/css/admin.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
  <aside id="sidebar" class="admin-sidebar">
    <div class="sidebar-brand"><div class="sidebar-brand-icon">⚡</div><span class="sidebar-brand-name">EventHub Admin</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a href="/admin-panel/dashboard/"  class="sidebar-link">🏠 Dashboard</a>
      <a href="/admin-panel/create-event/" class="sidebar-link">➕ Create Event</a>
      <div class="sidebar-section-label" style="margin-top:8px">Manage</div>
      <a href="/admin-panel/categories/" class="sidebar-link">🏷 Categories</a>
      <a href="/admin-panel/tags/"       class="sidebar-link">🔖 Tags</a>
      <a href="/admin-panel/tickets/"    class="sidebar-link">🎟 Tickets</a>
      <a href="/admin-panel/bookings/"   class="sidebar-link">📋 Bookings</a>
      <div class="sidebar-section-label" style="margin-top:8px">Geography</div>
      <a href="/admin-panel/countries/"  class="sidebar-link active">🌍 Countries</a>
      <a href="/admin-panel/states/"     class="sidebar-link">🗺 States</a>
      <a href="/admin-panel/cities/"     class="sidebar-link">🏙 Cities</a>
      <div class="sidebar-section-label" style="margin-top:8px">Site</div>
      <a href="/events/" class="sidebar-link">👁 View Site</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()" class="sidebar-logout">🚪 Sign Out</button></div>
  </aside>
  <div class="admin-main">
    <header class="admin-topbar">
      <button class="topbar-toggle" onclick="toggleSidebar()"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <span class="topbar-title">Country Management</span>
      <button class="topbar-theme-toggle" id="themeToggleBtn" onclick="toggleTheme()" title="Toggle dark/light mode" aria-label="Toggle theme">
        <span class="tt-icon tt-moon">🌙</span>
        <div class="tt-track"><div class="tt-thumb"></div></div>
        <span class="tt-icon tt-sun">☀️</span>
        <span class="tt-label" id="themeLabel">Dark</span>
      </button>
    </header>
    <div class="admin-content">
      <div id="alertSuccess" class="admin-alert admin-alert-success">✓ <span id="alertSuccessText"></span></div>
      <div id="alertError"   class="admin-alert admin-alert-error">✕ <span id="alertErrorText"></span></div>

      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px">
        <input type="text" id="searchInput" class="filter-input" placeholder="Search countries…" oninput="filterItems()">
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Add Country</button>
      </div>

      <div class="admin-table-wrap">
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead><tr><th>#</th><th>Country Name</th><th>Status</th><th>Slug</th><th>Actions</th></tr></thead>
            <tbody id="itemsTableBody"><tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-4)">Loading…</td></tr></tbody>
          </table>
        </div>
        <div class="admin-pagination">
          <span class="admin-page-info" id="paginationInfo">—</span>
          <div class="admin-page-btns">
            <button class="admin-page-btn" id="prevBtn" onclick="loadPage(currentPage-1)">← Prev</button>
            <span class="admin-page-numbers" id="pageNumbers"></span>
            <button class="admin-page-btn" id="nextBtn" onclick="loadPage(currentPage+1)">Next →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Notification / Confirm Modal -->
<div id="notifModalOverlay" class="modal-overlay">
  <div id="notifModalBox" class="modal" style="max-width:420px; padding: 32px 28px 24px; display: flex; flex-direction: column; gap: 16px;">
    <div id="notifModalIcon" style="font-size: 2.4rem; text-align: center; line-height: 1;"></div>
    <h3 id="notifModalTitle" style="font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); text-align: center; margin: 0;"></h3>
    <p id="notifModalMessage" style="font-size: 0.9rem; color: var(--text-2); text-align: center; line-height: 1.55; white-space: pre-wrap; word-break: break-word;"></p>
    <div id="notifModalActions" style="display: flex; gap: 10px; margin-top: 4px;">
      <button id="notifModalCancel" class="btn btn-ghost" style="display:none; flex:1;" onclick="_notifResolve(false)">Cancel</button>
      <button id="notifModalOk" class="btn btn-danger" style="flex:1;" onclick="_notifResolve(true)">OK</button>
    </div>
  </div>
</div>

<div id="itemModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="max-width:440px" onclick="event.stopPropagation()">
    <div class="modal-header"><h2 class="modal-title" id="modalTitle">Add Country</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
    <input type="hidden" id="itemId">
    <div class="form-group">
      <label class="form-label">Country Name <span>*</span></label>
      <input type="text" id="itemName" class="form-input" placeholder="e.g. India">
      <small class="form-error" id="itemName-error" style="display:none"></small>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<script>
  /* ---- Theme Toggle ---- */
  (function(){
    const saved=localStorage.getItem('adminTheme')||'dark';
    document.documentElement.setAttribute('data-theme',saved);
  })();
  function toggleTheme(){
    const html=document.documentElement;
    const next=html.getAttribute('data-theme')==='dark'?'light':'dark';
    html.setAttribute('data-theme',next);
    localStorage.setItem('adminTheme',next);
    const lbl=document.getElementById('themeLabel');
    if(lbl)lbl.textContent=next==='dark'?'Dark':'Light';
  }
  function applyThemeLabel(){
    const lbl=document.getElementById('themeLabel');
    if(lbl)lbl.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'Dark':'Light';
  }
  document.addEventListener('DOMContentLoaded',applyThemeLabel);

  let allItems=[],isEditMode=false,currentPage=1,totalPages=1,totalCount=0;
  const PAGE_SIZE=15;let debounce;
  function gql(q,v={},t=null){const h={'Content-Type':'application/json'};if(t)h['Authorization']=`JWT ${t}`;return fetch('/graphql/',{method:'POST',headers:h,body:JSON.stringify({query:q,variables:v})}).then(r=>r.json());}
  function tok(){return localStorage.getItem('access_token');}
  function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed');}
  function logout(){localStorage.removeItem('access_token');localStorage.removeItem('refresh_token');window.location.href='/events/';}

  /* ── Notification Modal ── */
  let _notifResolve=null;
  function _notifOpen(icon,title,msg,type,showCancel){
    return new Promise(resolve=>{
      _notifResolve=v=>{document.getElementById('notifModalOverlay').classList.remove('open');resolve(v);};
      const o=document.getElementById('notifModalOverlay');
      o.setAttribute('data-type',type);
      document.getElementById('notifModalIcon').textContent=icon;
      document.getElementById('notifModalTitle').textContent=title;
      document.getElementById('notifModalMessage').textContent=msg;
      document.getElementById('notifModalCancel').style.display=showCancel?'':'none';
      document.getElementById('notifModalOk').textContent=showCancel?'Delete':'OK';
      o.classList.add('open');
    });
  }
  function showNotif(msg,type='info'){const i={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};const t={success:'Success',error:'Error',warning:'Warning',info:'Notice'};return _notifOpen(i[type]||'ℹ️',t[type]||'Notice',msg,type,false);}
  function showConfirm(msg,title='Are you sure?',icon='🗑'){return _notifOpen(icon,title,msg,'confirm',true);}
  document.getElementById('notifModalOverlay').addEventListener('click',function(e){if(e.target===this&&_notifResolve)_notifResolve(false);});

  async function checkAdmin(){if(!tok()){window.location.href='/login/';return false;}const d=await gql('{ me { isStaff isSuperuser } }',{},tok());const u=d.data?.me;if(!u||(!u.isStaff&&!u.isSuperuser)){await showNotif('Access denied. You do not have permission to view this page.','error');window.location.href='/events/';return false;}return true;}

  async function loadItems(page=1){
    currentPage=page;
    const search=document.getElementById('searchInput').value.trim()||null;
    const d=await gql(`query($page:Int,$ps:Int,$s:String){
      paginatedCountries(page:$page,pageSize:$ps,search:$s){results{id name slug}totalCount numPages currentPage}
    }`,{page,ps:PAGE_SIZE,s:search},tok());
    if(d.errors){showErr('Failed to load');return;}
    const pg=d.data.paginatedCountries;
    allItems=pg.results;totalCount=pg.totalCount;totalPages=pg.numPages;currentPage=pg.currentPage;
    render((currentPage-1)*PAGE_SIZE);updatePagination();
  }

  function render(startIdx){
    const tb=document.getElementById('itemsTableBody');
    if(!allItems.length){tb.innerHTML=`<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-4)">No countries found</td></tr>`;return;}
    tb.innerHTML=allItems.map((c,i)=>`<tr>
      <td>${startIdx+i+1}</td>
      <td class="td-primary">🌍 ${c.name}</td>
      <td><span class="badge badge-green">Active</span></td>
      <td style="color:var(--text-3)">${c.slug||'—'}</td>
      <td><div class="td-actions">
        <button class="td-action-btn td-edit" onclick="openEditModal('${c.id}')">Edit</button>
        <button class="td-action-btn td-delete" onclick="deleteItem('${c.id}')">Delete</button>
      </div></td>
    </tr>`).join('');
  }

  function loadPage(p){if(p>=1&&p<=totalPages)loadItems(p);}
  function filterItems(){clearTimeout(debounce);debounce=setTimeout(()=>loadItems(1),350);}
  function updatePagination(){
    const s=totalCount>0?((currentPage-1)*PAGE_SIZE)+1:0,e=Math.min(currentPage*PAGE_SIZE,totalCount);
    document.getElementById('paginationInfo').textContent=`${s}–${e} of ${totalCount}`;
    document.getElementById('pageNumbers').textContent=`Page ${currentPage} of ${totalPages}`;
    document.getElementById('prevBtn').disabled=currentPage<=1;
    document.getElementById('nextBtn').disabled=currentPage>=totalPages;
  }

  function openAddModal(){isEditMode=false;document.getElementById('modalTitle').textContent='Add Country';document.getElementById('itemId').value='';document.getElementById('itemName').value='';showFieldErr('');document.getElementById('itemModal').classList.add('open');}
  function openEditModal(id){isEditMode=true;const c=allItems.find(x=>x.id===id);if(!c)return;document.getElementById('modalTitle').textContent='Edit Country';document.getElementById('itemId').value=c.id;document.getElementById('itemName').value=c.name;showFieldErr('');document.getElementById('itemModal').classList.add('open');}
  function closeModal(){document.getElementById('itemModal').classList.remove('open');}
  function showFieldErr(msg){const el=document.getElementById('itemName-error');el.textContent=msg;el.style.display=msg?'block':'none';}

  async function saveItem(){
    const name=document.getElementById('itemName').value.trim();
    if(!name){showFieldErr('Name is required.');return;}
    const id=document.getElementById('itemId').value;
    const q=isEditMode
      ?'mutation($id:ID!,$n:String){updateCountry(id:$id,name:$n){success message}}'
      :'mutation($n:String!){createCountry(name:$n){success message}}';
    const v=isEditMode?{id,n:name}:{n:name};
    const d=await gql(q,v,tok());
    const r=d.data?.updateCountry||d.data?.createCountry;
    if(r?.success){showOk(`Country ${isEditMode?'updated':'created'}`);closeModal();loadItems(currentPage);}
    else showFieldErr(r?.message||'Failed');
  }

  async function deleteItem(id){
    const ok=await showConfirm('This country will be permanently deleted.','Delete Country?','🗑');
    if(!ok)return;
    const d=await gql(`mutation{deleteCountry(id:"${id}"){success message}}`,{},tok());
    if(d.data?.deleteCountry?.success){showOk('Deleted');loadItems(currentPage);}
    else showErr(d.data?.deleteCountry?.message||'Failed');
  }

  function showOk(msg){const el=document.getElementById('alertSuccess');document.getElementById('alertSuccessText').textContent=msg;el.classList.add('show');document.getElementById('alertError').classList.remove('show');setTimeout(()=>el.classList.remove('show'),3000);}
  function showErr(msg){const el=document.getElementById('alertError');document.getElementById('alertErrorText').textContent=msg;el.classList.add('show');}

  document.addEventListener('DOMContentLoaded',async()=>{const ok=await checkAdmin();if(ok)loadItems();});
</script>
</body>
</html>
