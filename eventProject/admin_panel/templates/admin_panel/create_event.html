<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Event — EventHub Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <link href="/static/css/admin.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
  <aside id="sidebar" class="admin-sidebar">
    <div class="sidebar-brand"><div class="sidebar-brand-icon">⚡</div><span class="sidebar-brand-name">EventHub Admin</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a href="/admin-panel/dashboard/"  class="sidebar-link">🏠 Dashboard</a>
      <a href="/admin-panel/create-event/" class="sidebar-link active">➕ Create Event</a>
      <div class="sidebar-section-label" style="margin-top:8px">Manage</div>
      <a href="/admin-panel/categories/" class="sidebar-link">🏷 Categories</a>
      <a href="/admin-panel/tags/"       class="sidebar-link">🔖 Tags</a>
      <a href="/admin-panel/tickets/"    class="sidebar-link">🎟 Tickets</a>
      <a href="/admin-panel/bookings/"   class="sidebar-link">📋 Bookings</a>
      <div class="sidebar-section-label" style="margin-top:8px">Geography</div>
      <a href="/admin-panel/countries/"  class="sidebar-link">🌍 Countries</a>
      <a href="/admin-panel/states/"     class="sidebar-link">🗺 States</a>
      <a href="/admin-panel/cities/"     class="sidebar-link">🏙 Cities</a>
      <div class="sidebar-section-label" style="margin-top:8px">Site</div>
      <a href="/events/" class="sidebar-link">👁 View Site</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()" class="sidebar-logout">🚪 Sign Out</button></div>
  </aside>
  <div class="admin-main">
    <header class="admin-topbar">
      <button class="topbar-toggle" onclick="document.getElementById('sidebar').classList.toggle('collapsed')"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <span class="topbar-title">Create New Event</span>
      <button class="topbar-theme-toggle" id="themeToggleBtn" onclick="toggleTheme()" title="Toggle dark/light mode" aria-label="Toggle theme">
        <span class="tt-icon tt-moon">🌙</span>
        <div class="tt-track"><div class="tt-thumb"></div></div>
        <span class="tt-icon tt-sun">☀️</span>
        <span class="tt-label" id="themeLabel">Dark</span>
      </button>
      <button onclick="history.back()" class="btn btn-ghost btn-sm">← Back</button>
    </header>
    <div class="admin-content">
      <div id="alertSuccess" class="admin-alert admin-alert-success">✓ <span id="alertSuccessText"></span></div>
      <div id="alertError"   class="admin-alert admin-alert-error">✕ <span id="alertErrorText"></span></div>
      <div id="errorMessage" style="display:none" class="admin-alert admin-alert-error"></div>

      <div class="event-form-wrap">

        <form id="createEventForm" onsubmit="submitEvent(event)">
          {% csrf_token %}

          <!-- Basic Info -->
          <div class="form-section">
            <div class="form-section-title">📝 Basic Information</div>
            <div class="form-group">
              <label class="form-label">Event Title <span>*</span></label>
              <input type="text" id="title" name="title" class="form-input" placeholder="Enter event title" oninput="generateSlug()">
              <small class="form-error hidden" id="title-error"></small>
            </div>
            <input type="hidden" id="slug" name="slug">
            <div class="form-group">
              <label class="form-label">Short Description <span>*</span></label>
              <textarea id="shortDescription" name="short_description" class="form-input" placeholder="Brief description (max 255 characters)" maxlength="255" rows="2"></textarea>
              <small class="form-error hidden" id="shortDescription-error"></small>
            </div>
            <div class="form-group">
              <label class="form-label">Long Description <span>*</span></label>
              <textarea id="longDescription" name="long_description" class="form-input" placeholder="Detailed event description" rows="5"></textarea>
              <small class="form-error hidden" id="longDescription-error"></small>
            </div>
          </div>

          <!-- Date & Time -->
          <div class="form-section">
            <div class="form-section-title">📅 Date &amp; Time</div>
            <div class="form-grid-3">
              <div class="form-group">
                <label class="form-label">Event Date <span>*</span></label>
                <input type="date" id="eventDate" name="event_date" class="form-input">
                <small class="form-error hidden" id="eventDate-error"></small>
              </div>
              <div class="form-group">
                <label class="form-label">Start Time <span>*</span></label>
                <input type="time" id="startTime" name="start_time" class="form-input">
                <small class="form-error hidden" id="startTime-error"></small>
              </div>
              <div class="form-group">
                <label class="form-label">End Time <span>*</span></label>
                <input type="time" id="endTime" name="end_time" class="form-input">
                <small class="form-error hidden" id="endTime-error"></small>
              </div>
            </div>
          </div>

          <!-- Location -->
          <div class="form-section">
            <div class="form-section-title">📍 Location</div>
            <div class="form-group">
              <label class="form-label">Venue <span>*</span></label>
              <input type="text" id="venue" name="venue" class="form-input" placeholder="Event venue name">
              <small class="form-error hidden" id="venue-error"></small>
            </div>
            <div class="form-grid-3">
              <div class="form-group">
                <label class="form-label">Country <span>*</span></label>
                <select id="country" name="country" class="form-input" onchange="loadStates()">
                  <option value="">Select Country</option>
                </select>
                <small class="form-error hidden" id="country-error"></small>
              </div>
              <div class="form-group">
                <label class="form-label">State <span>*</span></label>
                <select id="state" name="state" class="form-input" onchange="loadCities()" disabled>
                  <option value="">Select State</option>
                </select>
                <small class="form-error hidden" id="state-error"></small>
              </div>
              <div class="form-group">
                <label class="form-label">City <span>*</span></label>
                <select id="city" name="city" class="form-input" disabled>
                  <option value="">Select City</option>
                </select>
                <small class="form-error hidden" id="city-error"></small>
              </div>
            </div>
          </div>

          <!-- Categories & Tags -->
          <div class="form-section">
            <div class="form-section-title">🏷 Categories &amp; Tags</div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label">Categories <span>*</span></label>
                <div class="form-checkbox-grid" id="categoriesOptions"><span style="color:var(--text-4);font-size:.875rem">Loading…</span></div>
                <div id="selectedCategoriesBadges" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px"></div>
                <small class="form-error hidden" id="categories-error"></small>
              </div>
              <div class="form-group">
                <label class="form-label">Tags</label>
                <div class="form-checkbox-grid" id="tagsOptions"><span style="color:var(--text-4);font-size:.875rem">Loading…</span></div>
                <div id="selectedTagsBadges" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px"></div>
              </div>
            </div>
          </div>

          <!-- Images -->
          <div class="form-section">
            <div class="form-section-title">🖼 Images</div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label">Feature Image</label>
                <input type="file" id="featureImage" name="feature_image" accept="image/*" class="form-input" style="padding:8px" onchange="previewFeatureImage()">
                <small class="form-error hidden" id="featureImage-error"></small>
                <div id="featureImagePreview" class="img-preview" style="display:none"></div>
              </div>
              <div class="form-group">
                <label class="form-label">Gallery Images</label>
                <input type="file" id="extraImages" name="extra_images" accept="image/*" multiple class="form-input" style="padding:8px" onchange="previewExtraImages()">
                <small class="form-error hidden" id="extraImages-error"></small>
                <div id="extraImagesPreview" class="extra-imgs-grid"></div>
              </div>
            </div>
          </div>

          <!-- Submit -->
          <div style="display:flex;gap:12px;margin-top:4px">
            <button type="submit" class="btn btn-primary" style="flex:1" id="submitBtn">🚀 Create Event</button>
            <button type="button" onclick="history.back()" class="btn btn-ghost">Cancel</button>
          </div>
        </form>

<!-- Notification / Confirm Modal -->
<div id="notifModalOverlay" class="modal-overlay">
  <div id="notifModalBox" class="modal" style="max-width:420px; padding: 32px 28px 24px; display: flex; flex-direction: column; gap: 16px;">
    <div id="notifModalIcon" style="font-size: 2.4rem; text-align: center; line-height: 1;"></div>
    <h3 id="notifModalTitle" style="font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); text-align: center; margin: 0;"></h3>
    <p id="notifModalMessage" style="font-size: 0.9rem; color: var(--text-2); text-align: center; line-height: 1.55; white-space: pre-wrap; word-break: break-word;"></p>
    <div id="notifModalActions" style="display: flex; gap: 10px; margin-top: 4px;">
      <button id="notifModalCancel" class="btn btn-ghost" style="display:none; flex:1;" onclick="_notifResolve(false)">Cancel</button>
      <button id="notifModalOk" class="btn btn-danger" style="flex:1;" onclick="_notifResolve(true)">OK</button>
    </div>
  </div>
</div>    <script>
        /* ---- Theme Toggle ---- */
        (function(){
          const saved=localStorage.getItem('adminTheme')||'dark';
          document.documentElement.setAttribute('data-theme',saved);
        })();
        function toggleTheme(){
          const html=document.documentElement;
          const next=html.getAttribute('data-theme')==='dark'?'light':'dark';
          html.setAttribute('data-theme',next);
          localStorage.setItem('adminTheme',next);
          const lbl=document.getElementById('themeLabel');
          if(lbl)lbl.textContent=next==='dark'?'Dark':'Light';
        }
        function applyThemeLabel(){
          const lbl=document.getElementById('themeLabel');
          if(lbl)lbl.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'Dark':'Light';
        }
        document.addEventListener('DOMContentLoaded',applyThemeLabel);

        let selectedCategories = [];
        let allEventSlugs = [];
        let selectedTags = [];
        let allCategories = [];
        let allTags = [];
        let newFeatureFile = null;
        let newExtraFiles = [];

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/events/';
        }

        /* ── Notification Modal ── */
        let _notifResolve=null;
        function _notifOpen(icon,title,msg,type,showCancel){
          return new Promise(resolve=>{
            _notifResolve=v=>{document.getElementById('notifModalOverlay').classList.remove('open');resolve(v);};
            const o=document.getElementById('notifModalOverlay');
            o.setAttribute('data-type',type);
            document.getElementById('notifModalIcon').textContent=icon;
            document.getElementById('notifModalTitle').textContent=title;
            document.getElementById('notifModalMessage').textContent=msg;
            document.getElementById('notifModalCancel').style.display=showCancel?'':'none';
            document.getElementById('notifModalOk').textContent=showCancel?'Delete':'OK';
            o.classList.add('open');
          });
        }
        function showNotif(msg,type='info'){const i={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};const t={success:'Success',error:'Error',warning:'Warning',info:'Notice'};return _notifOpen(i[type]||'ℹ️',t[type]||'Notice',msg,type,false);}
        function showConfirm(msg,title='Are you sure?',icon='🗑'){return _notifOpen(icon,title,msg,'confirm',true);}
        document.getElementById('notifModalOverlay').addEventListener('click',function(e){if(e.target===this&&_notifResolve)_notifResolve(false);});

        async function checkAdmin() {
            const accessToken = localStorage.getItem('access_token');
            if (!accessToken) {
                window.location.href = '/login/';
                return;
            }

            try {
                const res = await fetch('/graphql/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `JWT ${accessToken}` },
                    body: JSON.stringify({ query: '{ me { id isStaff isSuperuser } }' })
                });
                const data = await res.json();
                const user = data.data && data.data.me;
                if (!user || (!user.isStaff && !user.isSuperuser)) {
                    await showNotif('Only admins can create events', 'error');
                    window.location.href = '/events/';
                }
            } catch (error) {
                console.error('Error checking admin status:', error);
                window.location.href = '/login/';
            }
        }

        async function loadCategoriesAndTags() {
            try {
                const accessToken = localStorage.getItem('access_token');
                const res = await fetch('/graphql/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `JWT ${accessToken}` },
                    body: JSON.stringify({ query: '{ allCategories { id name } allEventTags { id name } }' })
                });
                const data = await res.json();
                allCategories = (data.data && data.data.allCategories) || [];
                allTags = (data.data && data.data.allEventTags) || [];
                renderCategories();
                renderTags();
            } catch (error) {
                console.error('Error loading categories and tags:', error);
                document.getElementById('categoriesOptions').innerHTML = '<p class="text-red-500 text-sm p-2">Failed to load categories</p>';
                document.getElementById('tagsOptions').innerHTML = '<p class="text-red-500 text-sm p-2">Failed to load tags</p>';
            }
        }

        function renderCategories() {
            const container = document.getElementById('categoriesOptions');
            if (!allCategories.length) { container.innerHTML = '<span style="color:var(--text-4);font-size:.875rem">No categories available</span>'; return; }
            container.innerHTML = allCategories.map(cat => `
                <label class="form-checkbox-item">
                    <input type="checkbox" value="${cat.id}"
                        ${selectedCategories.includes(cat.id) ? 'checked' : ''}
                        onchange="toggleCategory('${cat.id}', '${cat.name.replace(/'/g, "\\'")}')"
                        class="toggle-input" style="position:static;opacity:1;width:15px;height:15px;accent-color:var(--accent)">
                    <span>${cat.name}</span>
                </label>
            `).join('');
            updateCategoriesBadges();
        }

        function renderTags() {
            const container = document.getElementById('tagsOptions');
            if (!allTags.length) { container.innerHTML = '<span style="color:var(--text-4);font-size:.875rem">No tags available</span>'; return; }
            container.innerHTML = allTags.map(tag => `
                <label class="form-checkbox-item">
                    <input type="checkbox" value="${tag.id}"
                        ${selectedTags.includes(tag.id) ? 'checked' : ''}
                        onchange="toggleTag('${tag.id}', '${tag.name.replace(/'/g, "\\'")}')"
                        style="position:static;opacity:1;width:15px;height:15px;accent-color:var(--accent)">
                    <span>${tag.name}</span>
                </label>
            `).join('');
            updateTagsBadges();
        }

        function toggleCategory(categoryId, categoryName) {
            if (selectedCategories.includes(categoryId)) {
                selectedCategories = selectedCategories.filter(id => id !== categoryId);
            } else {
                selectedCategories.push(categoryId);
            }
            updateCategoriesBadges();
            showCategoriesError();
        }

        function toggleTag(tagId, tagName) {
            if (selectedTags.includes(tagId)) {
                selectedTags = selectedTags.filter(id => id !== tagId);
            } else {
                selectedTags.push(tagId);
            }
            updateTagsBadges();
        }

        function updateCategoriesBadges() {
            const container = document.getElementById('selectedCategoriesBadges');
            if (selectedCategories.length === 0) { container.innerHTML = ''; return; }
            const selectedCats = allCategories.filter(cat => selectedCategories.includes(cat.id));
            container.innerHTML = selectedCats.map(cat => `
                <span class="badge badge-green" style="cursor:pointer" onclick="removeCategory('${cat.id}')">${cat.name} ✕</span>
            `).join('');
        }

        function updateTagsBadges() {
            const container = document.getElementById('selectedTagsBadges');
            if (selectedTags.length === 0) { container.innerHTML = ''; return; }
            const selectedTagsData = allTags.filter(tag => selectedTags.includes(tag.id));
            container.innerHTML = selectedTagsData.map(tag => `
                <span class="badge badge-dark" style="cursor:pointer" onclick="removeTag('${tag.id}')">${tag.name} ✕</span>
            `).join('');
        }

        function removeCategory(categoryId) {
            selectedCategories = selectedCategories.filter(id => id !== categoryId);
            renderCategories();
            showCategoriesError();
        }

        function removeTag(tagId) {
            selectedTags = selectedTags.filter(id => id !== tagId);
            renderTags();
        }

        // No dropdown toggling needed — checkboxes are rendered inline

        function generateSlug() {
            const title = document.getElementById('title').value.trim();
            const slug = title.toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-');
            document.getElementById('slug').value = slug;
        }

        function slugifyTitle(value) {
            return value.trim().toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-');
        }

        async function loadAllEventSlugs() {
            try {
                const res = await fetch('/graphql/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: '{ allEvents { slug } }' })
                });
                const data = await res.json();
                allEventSlugs = ((data.data && data.data.allEvents) || []).map(e => e.slug);
            } catch (e) {
                console.error('Error loading event slugs:', e);
            }
        }

        function previewFeatureImage() {
            const file = document.getElementById('featureImage').files[0];
            const preview = document.getElementById('featureImagePreview');
            preview.innerHTML = '';
            preview.style.display = 'none';
            newFeatureFile = null;

            if (file) {
                newFeatureFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.style.display = 'block';
                    preview.innerHTML = `<img src="${e.target.result}" alt="Feature Preview" style="width:100%;max-height:200px;object-fit:cover;display:block">`;
                };
                reader.readAsDataURL(file);
            }
        }

        function removeNewFeatureImage() {
            document.getElementById('featureImagePreview').innerHTML = '';
            document.getElementById('featureImage').value = '';
            newFeatureFile = null;
            const errSpan = document.getElementById('featureImage-error');
            if (errSpan) { errSpan.textContent = 'Feature image is required.'; errSpan.classList.remove('hidden'); }
        }

        function previewExtraImages() {
            newExtraFiles = Array.from(document.getElementById('extraImages').files);
            renderNewExtraImagePreviews();
        }

        function renderNewExtraImagePreviews() {
            const preview = document.getElementById('extraImagesPreview');
            preview.innerHTML = '';
            newExtraFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const div = document.createElement('div');
                    div.className = 'relative w-fit';
                    div.innerHTML = `
                        <img src="${e.target.result}" class="h-24 w-24 object-cover rounded" alt="Preview">
                        <button type="button" onclick="removeNewExtraImage(${index})"
                            class="absolute top-0 right-0 translate-x-1/2 -translate-y-1/2 bg-red-500 text-white rounded-3xl w-5 h-5 flex items-center justify-center text-xs hover:bg-red-700 leading-none">✕</button>`;
                    preview.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }

        function removeNewExtraImage(index) {
            newExtraFiles.splice(index, 1);
            renderNewExtraImagePreviews();
        }

        async function loadCountries() {
            try {
                const accessToken = localStorage.getItem('access_token');
                const res = await fetch('/graphql/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `JWT ${accessToken}` },
                    body: JSON.stringify({ query: '{ allCountries { id name } }' })
                });
                const data = await res.json();
                const countries = (data.data && data.data.allCountries) || [];
                const select = document.getElementById('country');
                select.innerHTML = '<option value="">Select Country</option>' +
                    countries.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            } catch (error) {
                console.error('Error loading countries:', error);
            }
        }

        async function loadStates() {
            const countryId = document.getElementById('country').value;
            const stateSelect = document.getElementById('state');
            const citySelect = document.getElementById('city');
            
            stateSelect.innerHTML = '<option value="">Select State</option>';
            citySelect.innerHTML = '<option value="">Select City</option>';
            citySelect.disabled = true;

            showFieldError('country', countryId ? '' : 'Country is required.');
            showFieldError('state', '');
            showFieldError('city', '');

            if (!countryId) {
                stateSelect.disabled = true;
                return;
            }
            
            try {
                const accessToken = localStorage.getItem('access_token');
                const res = await fetch('/graphql/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `JWT ${accessToken}` },
                    body: JSON.stringify({ query: `{ statesByCountry(countryId: "${countryId}") { id name } }` })
                });
                const data = await res.json();
                const states = (data.data && data.data.statesByCountry) || [];
                stateSelect.innerHTML = '<option value="">Select State</option>' +
                    states.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                stateSelect.disabled = false;
            } catch (error) {
                console.error('Error loading states:', error);
            }
        }

        async function loadCities() {
            const stateId = document.getElementById('state').value;
            const citySelect = document.getElementById('city');
            
            citySelect.innerHTML = '<option value="">Select City</option>';

            showFieldError('state', stateId ? '' : 'State is required.');
            showFieldError('city', '');

            if (!stateId) {
                citySelect.disabled = true;
                return;
            }
            
            try {
                const accessToken = localStorage.getItem('access_token');
                const res = await fetch('/graphql/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `JWT ${accessToken}` },
                    body: JSON.stringify({ query: `{ citiesByState(stateId: "${stateId}") { id name } }` })
                });
                const data = await res.json();
                const cities = (data.data && data.data.citiesByState) || [];
                citySelect.innerHTML = '<option value="">Select City</option>' +
                    cities.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                citySelect.disabled = false;
            } catch (error) {
                console.error('Error loading cities:', error);
            }
        }

        async function submitEvent(event) {
            event.preventDefault();

            if (!validateForm()) {
                const firstError = document.querySelector('[id$="-error"]:not(.hidden)');
                if (firstError) firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Event...';

            try {
                const accessToken = localStorage.getItem('access_token');

                const mutation = `
                    mutation CreateEvent(
                        $title: String!, $countryId: ID!, $stateId: ID!, $cityId: ID!,
                        $venue: String!, $eventDate: Date!, $startTime: Time!, $endTime: Time!,
                        $shortDescription: String!, $longDescription: String!,
                        $categoryIds: [ID], $tagIds: [ID], $isActive: Boolean
                    ) {
                        createEvent(
                            title: $title, countryId: $countryId, stateId: $stateId, cityId: $cityId,
                            venue: $venue, eventDate: $eventDate, startTime: $startTime, endTime: $endTime,
                            shortDescription: $shortDescription, longDescription: $longDescription,
                            categoryIds: $categoryIds, tagIds: $tagIds, isActive: $isActive
                        ) {
                            success message
                            event { id slug }
                        }
                    }
                `;

                const variables = {
                    title:            document.getElementById('title').value,
                    countryId:        document.getElementById('country').value,
                    stateId:          document.getElementById('state').value,
                    cityId:           document.getElementById('city').value,
                    venue:            document.getElementById('venue').value,
                    eventDate:        document.getElementById('eventDate').value,
                    startTime:        document.getElementById('startTime').value,
                    endTime:          document.getElementById('endTime').value,
                    shortDescription: document.getElementById('shortDescription').value,
                    longDescription:  document.getElementById('longDescription').value,
                    categoryIds:      selectedCategories.map(String),
                    tagIds:           selectedTags.map(String),
                    isActive:         true,
                };

                const res = await fetch('/graphql/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `JWT ${accessToken}` },
                    body: JSON.stringify({ query: mutation, variables })
                });
                const data = await res.json();
                const result = data.data?.createEvent;

                if (!result?.success) {
                    showError(result?.message || 'Error creating event. Please try again.');
                    return;
                }

                const eventId   = result.event.id;
                const eventSlug = result.event.slug;

                if (newFeatureFile) {
                    const imgForm = new FormData();
                    imgForm.append('feature_image', newFeatureFile);
                    await fetch(`/events/${eventId}/feature-image/`, {
                        method: 'PATCH',
                        headers: { 'Authorization': `JWT ${accessToken}` },
                        body: imgForm
                    });
                }

                if (newExtraFiles.length > 0) {
                    const extraForm = new FormData();
                    newExtraFiles.forEach(img => extraForm.append('images', img));
                    await fetch(`/events/${eventId}/extra-images/`, {
                        method: 'POST',
                        headers: { 'Authorization': `JWT ${accessToken}` },
                        body: extraForm
                    });
                }

                showSuccess('Event created successfully! Redirecting...');
                setTimeout(() => {
                    window.location.href = `/admin-panel/dashboard/`;
                }, 1000);

            } catch (error) {
                showError('Network error: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Event';
            }
        }

        function showSuccess(message) {
            const el = document.getElementById('alertSuccess');
            document.getElementById('alertSuccessText').textContent = message;
            el.classList.add('show');
            document.getElementById('errorMessage').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            if (Array.isArray(message)) {
                el.innerHTML = message.map(msg => `<div>• ${msg}</div>`).join('');
            } else {
                el.textContent = message;
            }
            el.style.display = 'flex';
            document.getElementById('alertSuccess').classList.remove('show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // No dropdown close listener needed

        document.addEventListener('DOMContentLoaded', () => {
            checkAdmin();
            loadCategoriesAndTags();
            loadCountries();
            loadAllEventSlugs();

            ['title', 'shortDescription', 'longDescription', 'venue'].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                const debouncedFn = debounce(function () { showFieldError(id, validateEventField(id, this.value)); }, 350);
                el.addEventListener('input', debouncedFn);
                el.addEventListener('blur',  function () { showFieldError(id, validateEventField(id, this.value)); });
            });

            ['eventDate', 'startTime', 'endTime'].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('change', function () {
                    showFieldError(id, validateEventField(id, this.value));
                    if (id === 'startTime' || id === 'endTime') validateTimes();
                });
                el.addEventListener('blur', function () {
                    showFieldError(id, validateEventField(id, this.value));
                    if (id === 'startTime' || id === 'endTime') validateTimes();
                });
            });

            const cityEl = document.getElementById('city');
            if (cityEl) cityEl.addEventListener('change', function () { showFieldError('city', this.value ? '' : 'City is required.'); });

            const fimgEl = document.getElementById('featureImage');
            if (fimgEl) fimgEl.addEventListener('change', function () {
                if (!newFeatureFile) showFieldError('featureImage', 'Feature image is required.');
                else validateFileInput('featureImage');
            });

            const eimgEl = document.getElementById('extraImages');
            if (eimgEl) eimgEl.addEventListener('change', function () { validateFileInput('extraImages'); });
        });


        const eventFieldRules = {
            title:            { name: 'Title',             required: true,  minLength: 3,  trim: true, noMultiSpace: true, pattern: /^[a-zA-Z][a-zA-Z0-9.,/?;':\u2019"{}[\]\-=_+()&*^%$#@!~`\u2014]*(\s+[a-zA-Z0-9.,/?;':\u2019"{}[\]\-=_+()&*^%$#@!~`\u2014]+)*$/, patternMessage: 'Title must start with a letter. Letters, numbers, spaces and special characters (.,/?;\':"{}[]-=_+()&*^%$#@!~`) are allowed.' },
            shortDescription: { name: 'Short description', required: true,  maxLength: 255, trim: true, noMultiSpace: true,pattern: /^[a-zA-Z][a-zA-Z0-9.,/?;':\u2019"{}[\]\-=_+()&*^%$#@!~`\u2014]*(\s+[a-zA-Z0-9.,/?;':\u2019"{}[\]\-=_+()&*^%$#@!~`\u2014]+)*$/, patternMessage: 'Short Description must start with a letter. Letters, numbers, spaces and special characters (.,/?;\':"{}[]-=_+()&*^%$#@!~`) are allowed.' },
            longDescription:  { name: 'Long description',  required: true,  minLength: 20, trim: true, noMultiSpace: true, pattern: /^[a-zA-Z][a-zA-Z0-9.,/?;':\u2019"{}[\]\-=_+()&*^%$#@!~`\u2014]*(\s+[a-zA-Z0-9.,/?;':\u2019"{}[\]\-=_+()&*^%$#@!~`\u2014]+)*$/, patternMessage: 'Long Description must start with a letter. Letters, numbers, spaces and special characters (.,/?;\':"{}[]-=_+()&*^%$#@!~`) are allowed.' },
            venue:            { name: 'Venue',             required: true,  trim: true, noMultiSpace: true,                pattern: /^[a-zA-Z][a-zA-Z0-9.,/?;':\u2019"{}[\]\-=_+()&*^%$#@!~`\u2014]*(\s+[a-zA-Z0-9.,/?;':\u2019"{}[\]\-=_+()&*^%$#@!~`\u2014]+)*$/, patternMessage: 'Venue must start with a letter. Letters, numbers, spaces and special characters (.,/?;\':"{}[]-=_+()&*^%$#@!~`) are allowed.' },
            eventDate:        { name: 'Event date',        required: true },
            startTime:        { name: 'Start time',        required: true },
            endTime:          { name: 'End time',          required: true },
            country:          { name: 'Country',           required: true },
            state:            { name: 'State',             required: true },
            city:             { name: 'City',              required: true },
        };

        function debounce(fn, delay) {
            let timer;
            return function (...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        }

        function showFieldError(fieldId, errorMessage) {
            const input   = document.getElementById(fieldId);
            const errSpan = document.getElementById(fieldId + '-error');
            if (!errSpan) return;

            if (input) {
                input.style.borderColor = errorMessage ? 'var(--red)' : '';
            }

            errSpan.textContent = errorMessage || '';
            errSpan.style.display = errorMessage ? 'block' : 'none';
        }

        function validateEventField(fieldId, value) {
            const rules = eventFieldRules[fieldId];
            if (!rules) return '';

            const trimmed = (value || '').trim();

            if (rules.required && !trimmed)
                return `${rules.name} is required.`;

            if (!trimmed) return ''; 

            if (rules.trim && value !== value.trim())
                return `${rules.name} cannot have leading or trailing spaces.`;

            if (rules.noMultiSpace && / {2,}/.test(value))
                return `${rules.name} cannot contain multiple consecutive spaces.`;

            if (rules.minLength && trimmed.length < rules.minLength)
                return `${rules.name} must be at least ${rules.minLength} characters.`;

            if (rules.maxLength && trimmed.length > rules.maxLength)
                return `${rules.name} cannot exceed ${rules.maxLength} characters.`;

            if (rules.pattern && !rules.pattern.test(trimmed))
                return rules.patternMessage || `${rules.name} contains invalid characters.`;

            if (fieldId === 'eventDate') {
                const today    = new Date();
                today.setHours(0, 0, 0, 0);
                const selected = new Date(value);
                if (selected < today)
                    return "Event date must be greater than today's date.";
            }

            if (fieldId === 'title') {
                const candidateSlug = slugifyTitle(trimmed);
                if (allEventSlugs.includes(candidateSlug))
                    return 'An event with this title already exists.';
            }

            return '';
        }

        function validateTimes() {
            const start = document.getElementById('startTime').value;
            const end   = document.getElementById('endTime').value;
            if (start && end && end <= start) {
                showFieldError('endTime', 'End time must be greater than start time.');
                return false;
            }
            if (end) showFieldError('endTime', validateEventField('endTime', end));
            return true;
        }

        function showCategoriesError() {
            const errSpan = document.getElementById('categories-error');
            const error   = selectedCategories.length === 0 ? 'At least one category is required.' : '';
            if (errSpan) {
                errSpan.textContent = error;
                errSpan.style.display = error ? 'block' : 'none';
            }
        }

        function validateFileInput(fieldId) {
            const input = document.getElementById(fieldId);
            const errSpan = document.getElementById(fieldId + '-error');
            if (!input || !errSpan) return '';

            const allowedExts = ['png', 'svg', 'jpg', 'jpeg'];
            const maxSize     = 5 * 1024 * 1024;
            const errors      = [];

            Array.from(input.files).forEach(file => {
                const ext = file.name.split('.').pop().toLowerCase();
                if (!allowedExts.includes(ext)) {
                    errors.push(`'${file.name}': invalid type '.${ext}'. Allowed: png, svg, jpg, jpeg.`);
                } else if (file.size > maxSize) {
                    errors.push(`'${file.name}': ${(file.size / (1024 * 1024)).toFixed(2)} MB exceeds the 5 MB limit.`);
                }
            });

            const errorMsg = errors.join(' ');
            errSpan.textContent = errorMsg;
            errSpan.style.display = errorMsg ? 'block' : 'none';
            return errorMsg;
        }

        function validateForm() {
            let hasErrors = false;

            
            ['title', 'shortDescription', 'longDescription', 'venue',
             'eventDate', 'startTime', 'endTime'].forEach(id => {
                const val   = (document.getElementById(id) || {}).value || '';
                const error = validateEventField(id, val);
                showFieldError(id, error);
                if (error) hasErrors = true;
            });

            
            if (!validateTimes()) hasErrors = true;

            ['country', 'state', 'city'].forEach(id => {
                const val   = (document.getElementById(id) || {}).value || '';
                const error = val ? '' : `${eventFieldRules[id].name} is required.`;
                showFieldError(id, error);
                if (error) hasErrors = true;
            });

            if (selectedCategories.length === 0) {
                showCategoriesError();
                hasErrors = true;
            }

            if (!newFeatureFile) {
                const errSpan = document.getElementById('featureImage-error');
                if (errSpan) { errSpan.textContent = 'Feature image is required.'; errSpan.style.display = 'block'; }
                hasErrors = true;
            } else {
                if (validateFileInput('featureImage')) hasErrors = true;
            }

            if (newExtraFiles.length > 0) {
                const allowedExts = ['png', 'svg', 'jpg', 'jpeg'];
                const maxSize = 5 * 1024 * 1024;
                const errSpan = document.getElementById('extraImages-error');
                const errors = [];
                newExtraFiles.forEach(file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    if (!allowedExts.includes(ext)) {
                        errors.push(`'${file.name}': invalid type '.${ext}'. Allowed: png, svg, jpg, jpeg.`);
                    } else if (file.size > maxSize) {
                        errors.push(`'${file.name}': ${(file.size / (1024 * 1024)).toFixed(2)} MB exceeds the 5 MB limit.`);
                    }
                });
                if (errors.length > 0) {
                    if (errSpan) { errSpan.textContent = errors.join(' '); errSpan.style.display = 'block'; }
                    hasErrors = true;
                } else {
                    if (errSpan) { errSpan.textContent = ''; errSpan.style.display = 'none'; }
                }
            }

            return !hasErrors;
        }

        // Event listeners are set up in the DOMContentLoaded handler above
    </script>
      </div><!-- /event-form-wrap -->
    </div><!-- /admin-content -->
  </div><!-- /admin-main -->
</div><!-- /admin-layout -->
</body>
</html>
