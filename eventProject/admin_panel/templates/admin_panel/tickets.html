<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tickets — EventHub Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <link href="/static/css/admin.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
  <aside id="sidebar" class="admin-sidebar">
    <div class="sidebar-brand"><div class="sidebar-brand-icon">⚡</div><span class="sidebar-brand-name">EventHub Admin</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a href="/admin-panel/dashboard/"  class="sidebar-link">🏠 Dashboard</a>
      <a href="/admin-panel/create-event/" class="sidebar-link">➕ Create Event</a>
      <div class="sidebar-section-label" style="margin-top:8px">Manage</div>
      <a href="/admin-panel/categories/" class="sidebar-link">🏷 Categories</a>
      <a href="/admin-panel/tags/"       class="sidebar-link">🔖 Tags</a>
      <a href="/admin-panel/tickets/"    class="sidebar-link active">🎟 Tickets</a>
      <a href="/admin-panel/bookings/"   class="sidebar-link">📋 Bookings</a>
      <div class="sidebar-section-label" style="margin-top:8px">Geography</div>
      <a href="/admin-panel/countries/"  class="sidebar-link">🌍 Countries</a>
      <a href="/admin-panel/states/"     class="sidebar-link">🗺 States</a>
      <a href="/admin-panel/cities/"     class="sidebar-link">🏙 Cities</a>
      <div class="sidebar-section-label" style="margin-top:8px">Site</div>
      <a href="/events/" class="sidebar-link">👁 View Site</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()" class="sidebar-logout">🚪 Sign Out</button></div>
  </aside>
  <div class="admin-main">
    <header class="admin-topbar">
      <button class="topbar-toggle" onclick="toggleSidebar()"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <span class="topbar-title">Ticket Management</span>
    </header>
    <div class="admin-content">
      <div id="alertSuccess" class="admin-alert admin-alert-success">✓ <span id="alertSuccessText"></span></div>
      <div id="alertError"   class="admin-alert admin-alert-error">✕ <span id="alertErrorText"></span></div>

      <div style="margin-bottom:20px">
        <input type="text" id="searchInput" class="filter-input" placeholder="Search events…" oninput="filterEvents()">
      </div>

      <div class="admin-table-wrap">
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead><tr><th>#</th><th>Event</th><th>Date</th><th>Price</th><th>Available Qty</th><th>Actions</th></tr></thead>
            <tbody id="eventsTableBody"><tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-4)">Loading…</td></tr></tbody>
          </table>
        </div>
        <div class="admin-pagination">
          <span class="admin-page-info" id="paginationInfo">—</span>
          <div class="admin-page-btns">
            <button class="admin-page-btn" id="prevBtn" onclick="loadPage(currentPage-1)">← Prev</button>
            <span class="admin-page-numbers" id="pageNumbers"></span>
            <button class="admin-page-btn" id="nextBtn" onclick="loadPage(currentPage+1)">Next →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Ticket Modal -->
<div id="ticketModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="max-width:440px" onclick="event.stopPropagation()">
    <div class="modal-header"><h2 class="modal-title">Edit Ticket</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
    <input type="hidden" id="eventId">
    <div class="form-group">
      <label class="form-label">Event</label>
      <input type="text" id="eventName" class="form-input" readonly style="opacity:.6;cursor:not-allowed">
    </div>
    <div class="form-grid-2" style="gap:16px">
      <div class="form-group">
        <label class="form-label">Price (₹) <span>*</span></label>
        <input type="number" id="ticketPrice" class="form-input" min="0" step="0.01" placeholder="0.00">
        <small class="form-error" id="ticketPrice-error" style="display:none"></small>
      </div>
      <div class="form-group">
        <label class="form-label">Available Qty <span>*</span></label>
        <input type="number" id="availableQuantity" class="form-input" min="0" placeholder="100">
        <small class="form-error" id="qty-error" style="display:none"></small>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveTicket()">Save Ticket</button>
    </div>
  </div>
</div>

<script>
  let allEvents=[],currentPage=1,totalPages=1,totalCount=0;
  const PAGE_SIZE=15;let debounce;
  function gql(q,v={},t=null){const h={'Content-Type':'application/json'};if(t)h['Authorization']=`JWT ${t}`;return fetch('/graphql/',{method:'POST',headers:h,body:JSON.stringify({query:q,variables:v})}).then(r=>r.json());}
  function tok(){return localStorage.getItem('access_token');}
  function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed');}
  function logout(){localStorage.removeItem('access_token');localStorage.removeItem('refresh_token');window.location.href='/events/';}
  async function checkAdmin(){if(!tok()){window.location.href='/login/';return false;}const d=await gql('{ me { isStaff isSuperuser } }',{},tok());const u=d.data?.me;if(!u||(!u.isStaff&&!u.isSuperuser)){alert('Access denied');window.location.href='/events/';return false;}return true;}

  async function loadEvents(page=1){
    currentPage=page;
    const search=document.getElementById('searchInput').value.trim()||null;
    const d=await gql(`query($page:Int,$ps:Int,$s:String){
      paginatedEvents(page:$page,pageSize:$ps,search:$s){results{id title eventDate}totalCount numPages currentPage}
    }`,{page,ps:PAGE_SIZE,s:search},tok());
    if(d.errors){showErr('Failed to load events');return;}
    const pg=d.data.paginatedEvents;
    allEvents=pg.results;totalCount=pg.totalCount;totalPages=pg.numPages;currentPage=pg.currentPage;
    await loadTickets();render((currentPage-1)*PAGE_SIZE);updatePagination();
  }

  async function loadTickets(){
    await Promise.all(allEvents.map(async ev=>{
      try{
        const d=await gql(`query{ticketByEventId(eventId:"${ev.id}"){id price availableQuantity}}`,{},tok());
        ev.ticket=d.data?.ticketByEventId||null;
      }catch(_){ev.ticket=null;}
    }));
  }

  function render(startIdx){
    const tb=document.getElementById('eventsTableBody');
    if(!allEvents.length){tb.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-4)">No events found</td></tr>`;return;}
    tb.innerHTML=allEvents.map((ev,i)=>{
      const t=ev.ticket;
      const price=t?`₹${parseFloat(t.price).toFixed(2)}`:'<span style="color:var(--text-4)">Not set</span>';
      const qty=t?t.availableQuantity:'<span style="color:var(--text-4)">—</span>';
      const date=ev.eventDate?new Date(ev.eventDate+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'N/A';
      return `<tr>
        <td>${startIdx+i+1}</td>
        <td class="td-primary">${ev.title}</td>
        <td style="color:var(--text-3)">${date}</td>
        <td style="font-weight:700;color:var(--text)">${price}</td>
        <td>${qty}</td>
        <td><button class="td-action-btn td-edit" onclick="openModal('${ev.id}','${ev.title.replace(/'/g,"\\'")}',${t?t.price:0},${t?t.availableQuantity:0})">Edit Ticket</button></td>
      </tr>`;
    }).join('');
  }

  function openModal(id,title,price,qty){
    document.getElementById('eventId').value=id;
    document.getElementById('eventName').value=title;
    document.getElementById('ticketPrice').value=price;
    document.getElementById('availableQuantity').value=qty;
    document.getElementById('ticketPrice-error').style.display='none';
    document.getElementById('qty-error').style.display='none';
    document.getElementById('ticketModal').classList.add('open');
  }
  function closeModal(){document.getElementById('ticketModal').classList.remove('open');}

  async function saveTicket(){
    const eventId=document.getElementById('eventId').value;
    const price=parseFloat(document.getElementById('ticketPrice').value);
    const quantity=parseInt(document.getElementById('availableQuantity').value);
    let ok=true;
    if(isNaN(price)||price<0){document.getElementById('ticketPrice-error').textContent='Invalid price';document.getElementById('ticketPrice-error').style.display='block';ok=false;}
    else document.getElementById('ticketPrice-error').style.display='none';
    if(isNaN(quantity)||quantity<0){document.getElementById('qty-error').textContent='Invalid qty';document.getElementById('qty-error').style.display='block';ok=false;}
    else document.getElementById('qty-error').style.display='none';
    if(!ok)return;
    const d=await gql('mutation($eid:String!,$p:Float!,$q:Int!){createOrUpdateTicket(eventId:$eid,price:$p,availableQuantity:$q){success message}}',{eid:eventId,p:price,q:quantity},tok());
    const r=d.data?.createOrUpdateTicket;
    if(r?.success){showOk('Ticket saved');closeModal();loadEvents(currentPage);}
    else showErr(r?.message||'Failed');
  }

  function filterEvents(){clearTimeout(debounce);debounce=setTimeout(()=>loadEvents(1),350);}
  function loadPage(p){if(p>=1&&p<=totalPages)loadEvents(p);}
  function updatePagination(){
    const s=totalCount>0?((currentPage-1)*PAGE_SIZE)+1:0,e=Math.min(currentPage*PAGE_SIZE,totalCount);
    document.getElementById('paginationInfo').textContent=`${s}–${e} of ${totalCount}`;
    document.getElementById('pageNumbers').textContent=`Page ${currentPage} of ${totalPages}`;
    document.getElementById('prevBtn').disabled=currentPage<=1;
    document.getElementById('nextBtn').disabled=currentPage>=totalPages;
  }
  function showOk(msg){const el=document.getElementById('alertSuccess');document.getElementById('alertSuccessText').textContent=msg;el.classList.add('show');document.getElementById('alertError').classList.remove('show');setTimeout(()=>el.classList.remove('show'),3000);}
  function showErr(msg){const el=document.getElementById('alertError');document.getElementById('alertErrorText').textContent=msg;el.classList.add('show');}

  document.addEventListener('DOMContentLoaded',async()=>{const ok=await checkAdmin();if(ok)loadEvents();});
</script>
</body>
</html>
