<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories — EventHub Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <link href="/static/css/admin.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
  <aside id="sidebar" class="admin-sidebar">
    <div class="sidebar-brand"><div class="sidebar-brand-icon">⚡</div><span class="sidebar-brand-name">EventHub Admin</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a href="/admin-panel/dashboard/"  class="sidebar-link">🏠 Dashboard</a>
      <a href="/admin-panel/create-event/" class="sidebar-link">➕ Create Event</a>
      <div class="sidebar-section-label" style="margin-top:8px">Manage</div>
      <a href="/admin-panel/categories/" class="sidebar-link active">🏷 Categories</a>
      <a href="/admin-panel/tags/"       class="sidebar-link">🔖 Tags</a>
      <a href="/admin-panel/tickets/"    class="sidebar-link">🎟 Tickets</a>
      <a href="/admin-panel/bookings/"   class="sidebar-link">📋 Bookings</a>
      <div class="sidebar-section-label" style="margin-top:8px">Geography</div>
      <a href="/admin-panel/countries/"  class="sidebar-link">🌍 Countries</a>
      <a href="/admin-panel/states/"     class="sidebar-link">🗺 States</a>
      <a href="/admin-panel/cities/"     class="sidebar-link">🏙 Cities</a>
      <div class="sidebar-section-label" style="margin-top:8px">Site</div>
      <a href="/events/" class="sidebar-link">👁 View Site</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()" class="sidebar-logout">🚪 Sign Out</button></div>
  </aside>
  <div class="admin-main">
    <header class="admin-topbar">
      <button class="topbar-toggle" onclick="toggleSidebar()"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <span class="topbar-title">Category Management</span>
    </header>
    <div class="admin-content">
      <div id="alertSuccess" class="admin-alert admin-alert-success">✓ <span id="alertSuccessText"></span></div>
      <div id="alertError"   class="admin-alert admin-alert-error">✕ <span id="alertErrorText"></span></div>

      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px">
        <input type="text" id="searchInput" class="filter-input" placeholder="Search categories…" oninput="filterCategories()">
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Add Category</button>
      </div>

      <div class="admin-table-wrap">
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead><tr><th>#</th><th>Name</th><th>Slug</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
            <tbody id="categoriesTableBody"><tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-4)">Loading…</td></tr></tbody>
          </table>
        </div>
        <div class="admin-pagination">
          <span class="admin-page-info" id="paginationInfo">—</span>
          <div class="admin-page-btns">
            <button class="admin-page-btn" id="prevBtn" onclick="loadPage(currentPage-1)">← Prev</button>
            <span class="admin-page-numbers" id="pageNumbers"></span>
            <button class="admin-page-btn" id="nextBtn" onclick="loadPage(currentPage+1)">Next →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="categoryModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="max-width:440px" onclick="event.stopPropagation()">
    <div class="modal-header"><h2 class="modal-title" id="modalTitle">Add Category</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="padding:0 0 8px">
      <input type="hidden" id="categoryId">
      <div class="form-group">
        <label class="form-label">Category Name <span>*</span></label>
        <input type="text" id="categoryName" class="form-input" maxlength="20" placeholder="e.g. Music Festival">
        <small class="form-error" id="categoryName-error" style="display:none"></small>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
        <label class="toggle-wrap">
          <input type="checkbox" class="toggle-input" id="categoryActive" checked>
          <span class="toggle-track"></span>
        </label>
        <span style="font-size:.875rem;color:var(--text-2)">Active</span>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveCategory()">Save Category</button>
    </div>
  </div>
</div>

<script>
  let allCategories=[],allCategorySlugs=[],isEditMode=false,currentPage=1,totalPages=1,totalCount=0;
  const PAGE_SIZE=15;let debounce;
  function gql(q,v={},t=null){const h={'Content-Type':'application/json'};if(t)h['Authorization']=`JWT ${t}`;return fetch('/graphql/',{method:'POST',headers:h,body:JSON.stringify({query:q,variables:v})}).then(r=>r.json());}
  function tok(){return localStorage.getItem('access_token');}
  function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed');}
  function logout(){localStorage.removeItem('access_token');localStorage.removeItem('refresh_token');window.location.href='/events/';}
  async function checkAdmin(){if(!tok()){window.location.href='/login/';return false;}const d=await gql('{ me { isStaff isSuperuser } }',{},tok());const u=d.data?.me;if(!u||(!u.isStaff&&!u.isSuperuser)){alert('Access denied');window.location.href='/events/';return false;}return true;}

  async function loadCategories(page=1){
    currentPage=page;
    const search=document.getElementById('searchInput').value.trim()||null;
    const d=await gql(`query($page:Int,$ps:Int,$s:String){
      paginatedCategories(page:$page,pageSize:$ps,search:$s){results{id name slug isActive createdAt}totalCount numPages currentPage}
      allCategories{id slug}
    }`,{page,ps:PAGE_SIZE,s:search},tok());
    if(d.errors){showErr('Failed to load');return;}
    const pg=d.data.paginatedCategories;
    allCategories=pg.results;totalCount=pg.totalCount;totalPages=pg.numPages;currentPage=pg.currentPage;
    allCategorySlugs=(d.data.allCategories||[]).map(c=>({id:c.id,slug:c.slug}));
    render((currentPage-1)*PAGE_SIZE);updatePagination();
  }

  function render(startIdx){
    const tb=document.getElementById('categoriesTableBody');
    if(!allCategories.length){tb.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-4)">No categories found</td></tr>`;return;}
    tb.innerHTML=allCategories.map((c,i)=>`<tr>
      <td>${startIdx+i+1}</td>
      <td><span class="td-primary">${c.name}</span></td>
      <td><code style="font-size:.75rem;color:var(--text-4);background:var(--surface-3);padding:2px 8px;border-radius:6px">${c.slug}</code></td>
      <td><span class="badge ${c.isActive?'badge-green':'badge-red'}">${c.isActive?'Active':'Inactive'}</span></td>
      <td style="color:var(--text-3)">${new Date(c.createdAt).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</td>
      <td><div class="td-actions">
        <button class="td-action-btn td-edit" onclick="openEditModal('${c.id}')">Edit</button>
        <button class="td-action-btn td-delete" onclick="deleteCategory('${c.id}')">Delete</button>
      </div></td>
    </tr>`).join('');
  }

  function loadPage(p){if(p>=1&&p<=totalPages)loadCategories(p);}
  function filterCategories(){clearTimeout(debounce);debounce=setTimeout(()=>loadCategories(1),350);}
  function updatePagination(){
    const s=totalCount>0?((currentPage-1)*PAGE_SIZE)+1:0,e=Math.min(currentPage*PAGE_SIZE,totalCount);
    document.getElementById('paginationInfo').textContent=`${s}–${e} of ${totalCount}`;
    document.getElementById('pageNumbers').textContent=`Page ${currentPage} of ${totalPages}`;
    document.getElementById('prevBtn').disabled=currentPage<=1;
    document.getElementById('nextBtn').disabled=currentPage>=totalPages;
  }

  function openAddModal(){isEditMode=false;document.getElementById('modalTitle').textContent='Add Category';document.getElementById('categoryId').value='';document.getElementById('categoryName').value='';document.getElementById('categoryActive').checked=true;clearErr();document.getElementById('categoryModal').classList.add('open');}
  function openEditModal(id){isEditMode=true;const c=allCategories.find(x=>x.id===id);if(!c)return;document.getElementById('modalTitle').textContent='Edit Category';document.getElementById('categoryId').value=c.id;document.getElementById('categoryName').value=c.name;document.getElementById('categoryActive').checked=c.isActive;clearErr();document.getElementById('categoryModal').classList.add('open');}
  function closeModal(){document.getElementById('categoryModal').classList.remove('open');clearErr();}

  function validateName(v){
    if(!v||!v.trim())return'Name is required.';
    if(v!==v.trim())return'No leading/trailing spaces.';
    if(/\s{2,}/.test(v))return'No consecutive spaces.';
    if(v.trim().length<3)return'Min 3 characters.';
    if(v.trim().length>20)return'Max 20 characters.';
    if(!/^[a-zA-Z]+(\s[a-zA-Z]+)*$/.test(v.trim()))return'Letters only.';
    const slug=v.trim().toLowerCase().replace(/\s+/g,'-');
    const editId=isEditMode?document.getElementById('categoryId').value:null;
    if(allCategorySlugs.find(s=>s.slug===slug&&s.id!==editId))return'Already exists.';
    return'';
  }
  function showFieldErr(msg){const el=document.getElementById('categoryName-error');el.textContent=msg;el.style.display=msg?'block':'none';}
  function clearErr(){showFieldErr('');}

  async function saveCategory(){
    const name=document.getElementById('categoryName').value;
    const isActive=document.getElementById('categoryActive').checked;
    const err=validateName(name);showFieldErr(err);if(err)return;
    const id=document.getElementById('categoryId').value;
    const q=isEditMode
      ?'mutation($id:ID!,$n:String,$a:Boolean){updateCategory(id:$id,name:$n,isActive:$a){success message}}'
      :'mutation($n:String!,$a:Boolean){createCategory(name:$n,isActive:$a){success message}}';
    const v=isEditMode?{id,n:name,a:isActive}:{n:name,a:isActive};
    const d=await gql(q,v,tok());
    const r=d.data?.(isEditMode?d.data.updateCategory:d.data.createCategory)||d.data?.updateCategory||d.data?.createCategory;
    if(r?.success){showOk(`Category ${isEditMode?'updated':'created'}`);closeModal();loadCategories(currentPage);}
    else showFieldErr(r?.message||'Failed');
  }

  async function deleteCategory(id){
    if(!confirm('Delete this category?'))return;
    const d=await gql(`mutation{deleteCategory(id:"${id}"){success message}}`,{},tok());
    if(d.data?.deleteCategory?.success){showOk('Deleted');loadCategories(currentPage);}
    else showErr(d.data?.deleteCategory?.message||'Failed');
  }

  function showOk(msg){const el=document.getElementById('alertSuccess');document.getElementById('alertSuccessText').textContent=msg;el.classList.add('show');document.getElementById('alertError').classList.remove('show');setTimeout(()=>el.classList.remove('show'),3000);}
  function showErr(msg){const el=document.getElementById('alertError');document.getElementById('alertErrorText').textContent=msg;el.classList.add('show');document.getElementById('alertSuccess').classList.remove('show');}

  document.getElementById('categoryName').addEventListener('input',function(){showFieldErr(validateName(this.value));});
  document.addEventListener('DOMContentLoaded',async()=>{const ok=await checkAdmin();if(ok)loadCategories();});
</script>
</body>
</html>
