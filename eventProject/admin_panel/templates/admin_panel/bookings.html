<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookings — EventHub Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <link href="/static/css/admin.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
  <aside id="sidebar" class="admin-sidebar">
    <div class="sidebar-brand"><div class="sidebar-brand-icon">⚡</div><span class="sidebar-brand-name">EventHub Admin</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a href="/admin-panel/dashboard/"  class="sidebar-link">🏠 Dashboard</a>
      <a href="/admin-panel/create-event/" class="sidebar-link">➕ Create Event</a>
      <div class="sidebar-section-label" style="margin-top:8px">Manage</div>
      <a href="/admin-panel/categories/" class="sidebar-link">🏷 Categories</a>
      <a href="/admin-panel/tags/"       class="sidebar-link">🔖 Tags</a>
      <a href="/admin-panel/tickets/"    class="sidebar-link">🎟 Tickets</a>
      <a href="/admin-panel/bookings/"   class="sidebar-link active">📋 Bookings</a>
      <div class="sidebar-section-label" style="margin-top:8px">Geography</div>
      <a href="/admin-panel/countries/"  class="sidebar-link">🌍 Countries</a>
      <a href="/admin-panel/states/"     class="sidebar-link">🗺 States</a>
      <a href="/admin-panel/cities/"     class="sidebar-link">🏙 Cities</a>
      <div class="sidebar-section-label" style="margin-top:8px">Site</div>
      <a href="/events/" class="sidebar-link">👁 View Site</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()" class="sidebar-logout">🚪 Sign Out</button></div>
  </aside>
  <div class="admin-main">
    <header class="admin-topbar">
      <button class="topbar-toggle" onclick="toggleSidebar()"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <span class="topbar-title">Booking Management</span>
      <button class="topbar-theme-toggle" id="themeToggleBtn" onclick="toggleTheme()" title="Toggle dark/light mode" aria-label="Toggle theme">
        <span class="tt-icon tt-moon">🌙</span>
        <div class="tt-track"><div class="tt-thumb"></div></div>
        <span class="tt-icon tt-sun">☀️</span>
        <span class="tt-label" id="themeLabel">Dark</span>
      </button>
    </header>
    <div class="admin-content">
      <div id="alertError" class="admin-alert admin-alert-error">✕ <span id="alertErrorText"></span></div>

      <div class="filters-bar">
        <input type="text" id="searchInput" class="filter-input" placeholder="Search booking reference, user, event…" oninput="filterBookings()" style="flex:1;min-width:240px">
        <select id="statusFilter" class="filter-select" onchange="filterBookings()">
          <option value="">All Status</option>
          <option value="confirmed">Confirmed</option>
          <option value="pending">Pending</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>

      <div class="admin-table-wrap">
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead><tr><th>Ref</th><th>User</th><th>Event</th><th>Qty</th><th>Total</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="bookingsTableBody"><tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-4)">Loading…</td></tr></tbody>
          </table>
        </div>
        <div class="admin-pagination">
          <span class="admin-page-info" id="paginationInfo">—</span>
          <div class="admin-page-btns">
            <button class="admin-page-btn" id="prevBtn" onclick="loadPage(currentPage-1)">← Prev</button>
            <span class="admin-page-numbers" id="pageNumbers"></span>
            <button class="admin-page-btn" id="nextBtn" onclick="loadPage(currentPage+1)">Next →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>


<!-- Notification / Confirm Modal -->
<div id="notifModalOverlay" class="modal-overlay">
  <div id="notifModalBox" class="modal" style="max-width:420px; padding: 32px 28px 24px; display: flex; flex-direction: column; gap: 16px;">
    <div id="notifModalIcon" style="font-size: 2.4rem; text-align: center; line-height: 1;"></div>
    <h3 id="notifModalTitle" style="font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); text-align: center; margin: 0;"></h3>
    <p id="notifModalMessage" style="font-size: 0.9rem; color: var(--text-2); text-align: center; line-height: 1.55; white-space: pre-wrap; word-break: break-word;"></p>
    <div id="notifModalActions" style="display: flex; gap: 10px; margin-top: 4px;">
      <button id="notifModalCancel" class="btn btn-ghost" style="display:none; flex:1;" onclick="_notifResolve(false)">Cancel</button>
      <button id="notifModalOk" class="btn btn-danger" style="flex:1;" onclick="_notifResolve(true)">OK</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div id="detailModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="max-width:560px" onclick="event.stopPropagation()">
    <div class="modal-header"><h2 class="modal-title">Booking Details</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div id="detailContent" class="admin-modal-content"></div>
  </div>
</div>

<script>
  /* ---- Theme Toggle ---- */
  (function(){
    const saved=localStorage.getItem('adminTheme')||'dark';
    document.documentElement.setAttribute('data-theme',saved);
  })();
  function toggleTheme(){
    const html=document.documentElement;
    const next=html.getAttribute('data-theme')==='dark'?'light':'dark';
    html.setAttribute('data-theme',next);
    localStorage.setItem('adminTheme',next);
    const lbl=document.getElementById('themeLabel');
    if(lbl)lbl.textContent=next==='dark'?'Dark':'Light';
  }
  function applyThemeLabel(){
    const lbl=document.getElementById('themeLabel');
    if(lbl)lbl.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'Dark':'Light';
  }
  document.addEventListener('DOMContentLoaded',applyThemeLabel);

  let allBookings=[],currentPage=1,totalPages=1,totalCount=0;
  const PAGE_SIZE=15;let debounceTimer;
  function gql(q,v={},t=null){const h={'Content-Type':'application/json'};if(t)h['Authorization']=`JWT ${t}`;return fetch('/graphql/',{method:'POST',headers:h,body:JSON.stringify({query:q,variables:v})}).then(r=>r.json());}
  function tok(){return localStorage.getItem('access_token');}
  function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed');}
  function logout(){localStorage.removeItem('access_token');localStorage.removeItem('refresh_token');window.location.href='/events/';}

  /* ── Notification Modal ── */
  let _notifResolve=null;
  function _notifOpen(icon,title,msg,type,showCancel){
    return new Promise(resolve=>{
      _notifResolve=v=>{document.getElementById('notifModalOverlay').classList.remove('open');resolve(v);};
      const o=document.getElementById('notifModalOverlay');
      o.setAttribute('data-type',type);
      document.getElementById('notifModalIcon').textContent=icon;
      document.getElementById('notifModalTitle').textContent=title;
      document.getElementById('notifModalMessage').textContent=msg;
      document.getElementById('notifModalCancel').style.display=showCancel?'':'none';
      document.getElementById('notifModalOk').textContent=showCancel?'Delete':'OK';
      o.classList.add('open');
    });
  }
  function showNotif(msg,type='info'){const i={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};const t={success:'Success',error:'Error',warning:'Warning',info:'Notice'};return _notifOpen(i[type]||'ℹ️',t[type]||'Notice',msg,type,false);}
  function showConfirm(msg,title='Are you sure?',icon='🗑'){return _notifOpen(icon,title,msg,'confirm',true);}
  document.getElementById('notifModalOverlay').addEventListener('click',function(e){if(e.target===this&&_notifResolve)_notifResolve(false);});

  async function checkAdmin(){
    if(!tok()){window.location.href='/login/';return false;}
    const d=await gql('{ me { isStaff isSuperuser } }',{},tok());
    if(d.errors){
      const msg=d.errors[0].message||'';
      if(msg.includes('session')||msg.includes('token')||msg.includes('Authentication')){
        showErr('Session expired. Redirecting to login...');
        setTimeout(()=>{localStorage.removeItem('access_token');localStorage.removeItem('refresh_token');window.location.href='/login/';},1500);
        return false;
      }
      showErr(msg);return false;
    }
    const u=d.data?.me;
    if(!u||(!u.isStaff&&!u.isSuperuser)){await showNotif('Access denied. You do not have permission to view this page.','error');window.location.href='/events/';return false;}
    return true;
  }

  async function loadBookings(page=1){
    currentPage=page;
    const search=document.getElementById('searchInput').value.trim()||null;
    const status=document.getElementById('statusFilter').value||null;
    const d=await gql(`query($page:Int,$ps:Int,$s:String,$st:String){
      allBookings(page:$page,pageSize:$ps,search:$s,status:$st){
        results{id bookingReference user{username email firstName lastName} event{title} ticket{price} quantity totalPrice status createdAt}
        totalCount numPages currentPage
      }
    }`,{page,ps:PAGE_SIZE,s:search,st:status},tok());
    if(d.errors){
      const msg=d.errors[0].message||'';
      if(msg.includes('session')||msg.includes('token')||msg.includes('log in')||msg.includes('Authentication')){
        showErr('Session expired. Please <a href="/login/" style="color:var(--accent-lt);text-decoration:underline">log in again</a>.');
        return;
      }
      showErr(msg);return;
    }
    const bk=d.data?.allBookings;
    if(!bk){showErr('No data returned from server.');return;}
    allBookings=bk.results||[];
    totalCount=bk.totalCount||0;totalPages=bk.numPages||1;currentPage=bk.currentPage||page;
    render();updatePagination();
  }

  function render(){
    const tb=document.getElementById('bookingsTableBody');
    if(!allBookings.length){tb.innerHTML=`<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-4)">No bookings found</td></tr>`;return;}
    // filter out any null results (can happen if user was deleted)
    const valid=allBookings.filter(b=>b!==null&&b!==undefined);
    if(!valid.length){tb.innerHTML=`<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-4)">No valid bookings to display</td></tr>`;return;}
    tb.innerHTML=valid.map(b=>{
      const user=b.user||{};
      const name=user.firstName&&user.lastName?`${user.firstName} ${user.lastName}`:(user.username||'—');
      const email=user.email||'—';
      const date=new Date(b.createdAt).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
      const badge=b.status==='confirmed'?'badge-green':b.status==='pending'?'badge-amber':'badge-red';
      return `<tr>
        <td><span style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--accent-lt);font-size:.8rem">${b.bookingReference}</span></td>
        <td><div class="td-primary">${name}</div><div class="td-sub">${email}</div></td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.event?b.event.title:'—'}</td>
        <td style="text-align:center">${b.quantity}</td>
        <td style="font-weight:700;color:var(--text)">₹${parseFloat(b.totalPrice).toFixed(2)}</td>
        <td style="color:var(--text-3)">${date}</td>
        <td><span class="badge ${badge}">${b.status}</span></td>
        <td><button class="td-action-btn td-view" onclick="viewDetail('${b.id}')">View</button></td>
      </tr>`;
    }).join('');
  }

  function viewDetail(id){
    const b=allBookings.find(x=>x&&x.id===id);if(!b)return;
    const user=b.user||{};
    const name=user.firstName&&user.lastName?`${user.firstName} ${user.lastName}`:(user.username||'—');
    const date=new Date(b.createdAt).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const badge=b.status==='confirmed'?'badge-green':b.status==='pending'?'badge-amber':'badge-red';
    document.getElementById('detailContent').innerHTML=`
      <div class="admin-modal-grid">
        <div><div class="admin-detail-label">Booking Ref</div><div style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--accent-lt)">${b.bookingReference}</div></div>
        <div><div class="admin-detail-label">Status</div><span class="badge ${badge}">${b.status}</span></div>
        <div><div class="admin-detail-label">Customer</div><div class="admin-detail-value">${name}</div></div>
        <div><div class="admin-detail-label">Email</div><div class="admin-detail-value">${user.email||'—'}</div></div>
        <div style="grid-column:1/-1"><div class="admin-detail-label">Event</div><div class="admin-detail-value">${b.event?b.event.title:'—'}</div></div>
        <div><div class="admin-detail-label">Quantity</div><div style="font-size:1.5rem;font-weight:800;color:var(--text)">${b.quantity}</div></div>
        <div><div class="admin-detail-label">Ticket Price</div><div class="admin-detail-value">₹${b.ticket?parseFloat(b.ticket.price).toFixed(2):'—'}</div></div>
        <div><div class="admin-detail-label">Total Paid</div><div style="font-size:1.5rem;font-weight:800;color:var(--green)">₹${parseFloat(b.totalPrice).toFixed(2)}</div></div>
        <div><div class="admin-detail-label">Booked On</div><div class="admin-detail-value">${date}</div></div>
      </div>`;
    document.getElementById('detailModal').classList.add('open');
  }
  function closeModal(){document.getElementById('detailModal').classList.remove('open');}

  function filterBookings(){clearTimeout(debounceTimer);debounceTimer=setTimeout(()=>loadBookings(1),350);}
  function loadPage(p){if(p>=1&&p<=totalPages)loadBookings(p);}
  function updatePagination(){
    const s=totalCount>0?((currentPage-1)*PAGE_SIZE)+1:0;
    const e=Math.min(currentPage*PAGE_SIZE,totalCount);
    document.getElementById('paginationInfo').textContent=`${s}–${e} of ${totalCount}`;
    document.getElementById('pageNumbers').textContent=`Page ${currentPage} of ${totalPages}`;
    document.getElementById('prevBtn').disabled=currentPage<=1;
    document.getElementById('nextBtn').disabled=currentPage>=totalPages;
  }
  function showErr(msg){
    const el=document.getElementById('alertError');
    document.getElementById('alertErrorText').innerHTML=msg;
    el.classList.add('show');
  }

  document.addEventListener('DOMContentLoaded',async()=>{
    const ok=await checkAdmin();if(ok)loadBookings();
  });
</script>
</body>
</html>
