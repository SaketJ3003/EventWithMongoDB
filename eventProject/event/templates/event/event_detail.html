<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Details — EventHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

<!-- Navigation -->
<nav class="nav">
  <div class="container nav-inner">
    <a href="/events/" class="nav-logo">EventHub</a>
    <div class="nav-links">
      <a href="/admin-panel/dashboard/" class="nav-link nav-link-admin" id="adminDashboardBtn" style="display:none">⚡ Admin</a>
      <a href="/login/" class="nav-link" id="loginLink">Login</a>
      <a href="/signup/" class="nav-link-primary" id="signupLink">Sign Up</a>
      <button onclick="logout()" class="nav-link nav-link-danger" id="logoutBtn" style="display:none">Sign Out</button>
    </div>
  </div>
</nav>

<!-- Content -->
<section class="section">
  <div class="container">
    <a href="/events/" class="back-btn">← Back to Events</a>

    <!-- Skeleton -->
    <div id="skeletonDetail">
      <div class="skeleton" style="height:420px;border-radius:20px;margin-bottom:36px"></div>
      <div class="skeleton skeleton-line-lg" style="width:60%;margin-bottom:12px"></div>
      <div class="skeleton skeleton-line" style="width:40%;margin-bottom:48px"></div>
      <div style="display:grid;grid-template-columns:1fr 340px;gap:40px">
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line" style="width:70%"></div>
        </div>
        <div class="skeleton" style="height:260px;border-radius:16px"></div>
      </div>
    </div>

    <!-- Event content -->
    <div id="eventContainer" style="display:none"></div>
    <div id="errorContainer" style="display:none"></div>
  </div>
</section>

<!-- Booking Modal -->
<div id="bookingModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">Book Tickets</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <input type="hidden" id="modalEventId">
    <input type="hidden" id="modalTicketPrice">

    <p class="label" style="margin-bottom:12px">Number of Tickets</p>
    <div class="qty-control">
      <button class="qty-btn" type="button" onclick="changeQty(-1)">−</button>
      <span class="qty-value" id="quantityInput">1</span>
      <button class="qty-btn" type="button" onclick="changeQty(1)">+</button>
    </div>

    <div class="modal-summary">
      <div class="modal-summary-row"><span>Price per ticket</span><span id="pricePerTicket">—</span></div>
      <div class="modal-summary-row"><span>Total Amount</span><strong id="totalPrice">—</strong></div>
    </div>

    <button type="button" class="btn btn-primary btn-wide" id="confirmBtn" onclick="confirmBooking()">Confirm Booking</button>
    <button type="button" class="btn btn-ghost btn-wide" style="margin-top:10px" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
  function gql(query, vars={}, token=null) {
    const h={'Content-Type':'application/json'};
    if(token) h['Authorization']=`JWT ${token}`;
    return fetch('/graphql/',{method:'POST',headers:h,body:JSON.stringify({query,variables:vars})}).then(r=>r.json());
  }

  async function checkAuth() {
    const token=localStorage.getItem('access_token');
    const loginEl=document.getElementById('loginLink'), signupEl=document.getElementById('signupLink');
    const logoutEl=document.getElementById('logoutBtn'), adminEl=document.getElementById('adminDashboardBtn');
    if(token){
      if(loginEl) loginEl.style.display='none';
      if(signupEl) signupEl.style.display='none';
      if(logoutEl) logoutEl.style.display='inline-flex';
      try{
        const d=await gql('{ me { isStaff isSuperuser } }',{},token);
        const u=d.data&&d.data.me;
        if(u&&(u.isStaff||u.isSuperuser)) adminEl.style.display='inline-flex';
      }catch(_){}
    }
  }
  function logout(){localStorage.removeItem('access_token');localStorage.removeItem('refresh_token');location.reload();}

  function fmt(date){if(!date)return'TBA';return new Date(date+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
  function fmtTime(t){if(!t)return'TBA';return new Date('1970-01-01T'+t).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});}

  async function loadEventDetail() {
    const slug = window.location.pathname.split('/').filter(Boolean).pop();
    const token = localStorage.getItem('access_token');
    try {
      const d = await gql(`
        query($slug:String!){ eventBySlug(slug:$slug){
          id title slug featureImage shortDescription longDescription
          eventDate startTime endTime isActive viewsCount venue
          country{name} state{name} city{name}
          category{name} tags{name} extraImages{image}
        }}
      `, {slug}, token);

      document.getElementById('skeletonDetail').style.display = 'none';

      if(d.errors){ showError(d.errors[0].message); return; }
      const ev = d.data.eventBySlug;
      if(!ev){ showError('Event not found.'); return; }

      document.title = ev.title + ' — EventHub';

      const cats = ev.category&&ev.category.length ? ev.category.map(c=>`<span class="badge badge-purple">${c.name}</span>`).join('') : '';
      const tags = ev.tags&&ev.tags.length       ? ev.tags.map(t=>`<span class="badge badge-dark">${t.name}</span>`).join('') : '';

      const gallery = ev.extraImages&&ev.extraImages.length ? `
        <div style="margin-top:48px">
          <div class="section-label"><h2>Gallery</h2></div>
          <div class="gallery">
            ${ev.extraImages.map(img=>`<div class="gallery-item"><img src="${img.image}" alt="Gallery" loading="lazy"></div>`).join('')}
          </div>
        </div>` : '';

      const heroImg = ev.featureImage
        ? `<img src="${ev.featureImage}" alt="${ev.title}" style="width:100%;height:100%;object-fit:cover">`
        : `<div style="display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-4)"><span style="font-size:3rem">🎭</span><span>No image available</span></div>`;

      document.getElementById('eventContainer').innerHTML = `
        <div>
          ${!ev.isActive?'<div class="alert alert-warning"><span class="alert-icon">⚠️</span>This event is currently inactive and only visible to administrators.</div>':''}
          <div class="detail-hero-image-wrap">${heroImg}</div>

          ${cats?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">${cats}</div>`:''}
          <h1 class="detail-title">${ev.title}</h1>

          <div class="detail-meta-bar">
            <div class="detail-meta-item"><div class="label">Date</div><div class="value">📅 ${fmt(ev.eventDate)}</div></div>
            <div class="detail-meta-item"><div class="label">Time</div><div class="value">⏰ ${fmtTime(ev.startTime)} – ${fmtTime(ev.endTime)}</div></div>
            <div class="detail-meta-item"><div class="label">Location</div><div class="value">📍 ${[ev.city?.name,ev.state?.name].filter(Boolean).join(', ')}</div></div>
            <div class="detail-meta-item"><div class="label">Views</div><div class="value">👁 ${ev.viewsCount||0}</div></div>
          </div>

          <div class="detail-grid">
            <div>
              <div class="section-label"><h2>About this Event</h2></div>
              <p class="body" style="white-space:pre-wrap">${ev.longDescription||'No description available.'}</p>

              <div class="info-card" style="margin-top:36px">
                <div class="section-label"><h2>Location Details</h2></div>
                <div class="info-row"><span class="label">Venue</span><span style="color:var(--text);font-weight:600;margin-top:4px">${ev.venue||'N/A'}</span></div>
                <div class="info-row"><span class="label">City</span><span style="color:var(--text-2);margin-top:4px">${ev.city?.name||'N/A'}</span></div>
                <div class="info-row"><span class="label">State</span><span style="color:var(--text-2);margin-top:4px">${ev.state?.name||'N/A'}</span></div>
                <div class="info-row"><span class="label">Country</span><span style="color:var(--text-2);margin-top:4px">${ev.country?.name||'N/A'}</span></div>
              </div>

              ${tags?`<div style="margin-top:24px"><div class="section-label"><h2>Tags</h2></div><div style="display:flex;flex-wrap:wrap;gap:8px">${tags}</div></div>`:''}

              ${gallery}
            </div>

            <div>
              <div class="info-card">
                <div class="section-label"><h2>Schedule</h2></div>
                <div class="info-row"><span class="label">Start</span><span style="color:var(--text);font-size:1.2rem;font-weight:700;margin-top:4px">${fmtTime(ev.startTime)}</span></div>
                <div class="info-row"><span class="label">End</span><span style="color:var(--text);font-size:1.2rem;font-weight:700;margin-top:4px">${fmtTime(ev.endTime)}</span></div>
              </div>

              <div class="info-card" id="bookingSection" style="margin-top:16px">
                <div class="section-label"><h2>Tickets</h2></div>
                <div id="ticketContent"><p style="color:var(--text-3);font-size:.9rem">Loading...</p></div>
              </div>
            </div>
          </div>

          <div id="adminActions" style="display:none;margin-top:48px;padding-top:32px;border-top:1px solid var(--border)">
            <p class="label" style="margin-bottom:12px">Admin Actions</p>
            <button onclick="deleteEvent('${ev.id}')" class="btn btn-danger">🗑 Delete Event</button>
          </div>
        </div>
      `;
      document.getElementById('eventContainer').style.display = 'block';

      await Promise.all([checkAdminActions(), loadTicket(ev.id)]);
    } catch(err) {
      document.getElementById('skeletonDetail').style.display = 'none';
      showError('Network error: ' + err.message);
    }
  }

  function showError(msg) {
    document.getElementById('errorContainer').innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Oops!</div><div class="empty-state-sub">${msg}</div></div>`;
    document.getElementById('errorContainer').style.display = 'block';
  }

  async function loadTicket(eventId) {
    const token = localStorage.getItem('access_token');
    const el = document.getElementById('ticketContent');
    try {
      const d = await gql('query($id:ID!){ticketByEventId(eventId:$id){id price availableQuantity}}', {id:eventId}, token);
      const t = d.data&&d.data.ticketByEventId;
      if (!t) {
        el.innerHTML = `<div class="alert alert-warning"><span class="alert-icon">💡</span>Tickets not yet configured for this event.</div>`;
        return;
      }
      const loggedIn = !!token;
      el.innerHTML = `
        <div>
          <p class="ticket-price">₹${parseFloat(t.price).toFixed(2)} <span>per ticket</span></p>
          <p style="color:var(--text-3);font-size:.875rem;margin:8px 0 20px">${t.availableQuantity} tickets available</p>
          <button class="btn btn-primary btn-wide" onclick="${loggedIn?`openModal('${eventId}','${t.price}')`:''}" ${loggedIn?'':'disabled'} id="bookBtn">
            ${loggedIn?'🎟 Book Tickets':'Login to Book'}
          </button>
          ${!loggedIn?`<p style="text-align:center;margin-top:10px;font-size:.8rem;color:var(--text-4)">Please <a href="/login/" style="color:var(--accent-lt)">login</a> to book tickets.</p>`:''}
        </div>`;
    } catch(_) {
      el.innerHTML = `<p style="color:var(--red);font-size:.875rem">Error loading ticket info.</p>`;
    }
  }

  async function checkAdminActions() {
    const token = localStorage.getItem('access_token');
    if (!token) return;
    try {
      const d = await gql('{ me { isStaff isSuperuser } }', {}, token);
      const u = d.data&&d.data.me;
      if (u&&(u.isStaff||u.isSuperuser)) document.getElementById('adminActions').style.display='block';
    } catch(_) {}
  }

  async function deleteEvent(id) {
    if (!confirm('Delete this event permanently?')) return;
    const token = localStorage.getItem('access_token');
    const d = await gql('mutation($id:ID!){deleteEvent(id:$id){success message}}', {id}, token);
    if (d.data?.deleteEvent?.success) { alert('Event deleted.'); window.location.href='/events/'; }
    else alert('Error: ' + (d.data?.deleteEvent?.message||'Unknown'));
  }

  /* modal */
  function openModal(eventId, price) {
    document.getElementById('modalEventId').value = eventId;
    document.getElementById('modalTicketPrice').value = parseFloat(price);
    document.getElementById('quantityInput').textContent = '1';
    document.getElementById('pricePerTicket').textContent = '₹' + parseFloat(price).toFixed(2);
    recalc();
    document.getElementById('bookingModal').classList.add('open');
  }
  function closeModal() { document.getElementById('bookingModal').classList.remove('open'); }
  function changeQty(delta) {
    const el = document.getElementById('quantityInput');
    let q = parseInt(el.textContent)||1;
    q = Math.max(1, Math.min(10, q + delta));
    el.textContent = q;
    recalc();
  }
  function recalc() {
    const q = parseInt(document.getElementById('quantityInput').textContent)||1;
    const p = parseFloat(document.getElementById('modalTicketPrice').value)||0;
    document.getElementById('totalPrice').textContent = '₹' + (q*p).toFixed(2);
  }
  async function confirmBooking() {
    const eventId  = document.getElementById('modalEventId').value;
    const quantity = parseInt(document.getElementById('quantityInput').textContent);
    const token    = localStorage.getItem('access_token');
    const btn      = document.getElementById('confirmBtn');
    btn.disabled   = true; btn.textContent = 'Booking...';
    try {
      const d = await gql(`
        mutation($eventId:String!,$quantity:Int!){bookTickets(eventId:$eventId,quantity:$quantity){
          success message booking{bookingReference totalPrice} downloadLink
        }}
      `, {eventId, quantity}, token);
      const r = d.data?.bookTickets;
      if (r?.success) {
        alert(`✅ Booking confirmed!\nRef: ${r.booking.bookingReference}\nTotal: ₹${r.booking.totalPrice}`);
        closeModal();
        const slug = window.location.pathname.split('/').filter(Boolean).pop();
        const ev   = await gql('query($slug:String!){eventBySlug(slug:$slug){id}}', {slug}, token);
        if (ev.data?.eventBySlug) loadTicket(ev.data.eventBySlug.id);
      } else {
        alert('Error: ' + (r?.message||'Booking failed'));
      }
    } catch(err) { alert('Error: ' + err.message); }
    finally { btn.disabled=false; btn.textContent='Confirm Booking'; }
  }

  document.addEventListener('DOMContentLoaded', () => { checkAuth(); loadEventDetail(); });
</script>
</body>
</html>
