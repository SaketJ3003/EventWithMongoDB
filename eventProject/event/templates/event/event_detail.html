<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Details — EventHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>(function(){var t=localStorage.getItem('eh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>

<!-- Animated Background -->
<div class="page-bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<canvas id="particleCanvas"></canvas>

<!-- Floating Dock -->
<nav class="dock" id="mainDock">
  <span class="dock-logo">EventHub</span>
  <div class="dock-sep"></div>
  <a href="/events/" class="dock-item">
    <span class="dock-icon">🎪</span>
    <span>Events</span>
  </a>
  <a href="/my-bookings/" class="dock-item" id="myBookingsBtn" style="display:none">
    <span class="dock-icon">🎟</span>
    <span>Bookings</span>
  </a>
  <a href="/admin-panel/dashboard/" class="dock-item" id="adminDashboardBtn" style="display:none">
    <span class="dock-icon">⚡</span>
    <span>Admin</span>
  </a>
  <div class="dock-sep" id="authSep" style="display:none"></div>
  <a href="/login/" class="dock-item" id="loginLink">
    <span class="dock-icon">🔑</span>
    <span>Login</span>
  </a>
  <a href="/signup/" class="dock-item" id="signupLink">
    <span class="dock-icon">✨</span>
    <span>Sign Up</span>
  </a>
  <button onclick="logout()" class="dock-item" id="logoutBtn" style="display:none">
    <span class="dock-icon">👋</span>
    <span>Sign Out</span>
  </button>
  <div class="dock-sep"></div>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode" aria-label="Toggle theme">
    <span class="theme-toggle-icon theme-toggle-moon">🌙</span>
    <div class="theme-toggle-track"><div class="theme-toggle-thumb"></div></div>
    <span class="theme-toggle-icon theme-toggle-sun">☀️</span>
  </button>
</nav>

<!-- Content -->
<section class="section" style="padding-top:40px">
  <div class="container">
    <a href="/events/" class="back-btn">← Back to Events</a>

    <!-- Skeleton -->
    <div id="skeletonDetail">
      <div class="skeleton" style="height:480px;border-radius:24px;margin-bottom:40px"></div>
      <div class="skeleton skeleton-line-lg" style="width:65%;margin-bottom:16px"></div>
      <div class="skeleton skeleton-line" style="width:45%;margin-bottom:52px"></div>
      <div style="display:grid;grid-template-columns:1fr 360px;gap:44px">
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line" style="width:75%"></div>
        </div>
        <div class="skeleton" style="height:280px;border-radius:20px"></div>
      </div>
    </div>

    <!-- Event content -->
    <div id="eventContainer" style="display:none"></div>
    <div id="errorContainer" style="display:none"></div>
  </div>
</section>

<!-- Booking Modal -->
<div id="bookingModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">🎟 Book Tickets</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <input type="hidden" id="modalEventId">
    <input type="hidden" id="modalTicketPrice">

    <p class="label" style="margin-bottom:14px">Number of Tickets</p>
    <div class="qty-control">
      <button class="qty-btn" type="button" onclick="changeQty(-1)">−</button>
      <span class="qty-value" id="quantityInput">1</span>
      <button class="qty-btn" type="button" onclick="changeQty(1)">+</button>
    </div>

    <div class="modal-summary">
      <div class="modal-summary-row"><span>Price per ticket</span><span id="pricePerTicket">—</span></div>
      <div class="modal-summary-row"><span>Total Amount</span><strong id="totalPrice">—</strong></div>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 10px;">
      <button type="button" class="btn btn-primary" id="confirmBtn" onclick="confirmBooking()" style="flex: 1;">Confirm Booking</button>
      <button type="button" class="btn btn-primary" id="testBypassBtn" onclick="testBypassBooking()" style="flex: 1; background-color: #28a745; border-color: #28a745;">Test Success</button>
    </div>
    <button type="button" class="btn btn-ghost btn-wide" style="margin-top:10px" onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- Notification / Confirm Modal -->
<div id="notifModalOverlay" class="modal-overlay">
  <div id="notifModalBox" class="modal" style="max-width:420px; padding: 32px 28px 24px; display: flex; flex-direction: column; gap: 16px;">
    <div id="notifModalIcon" style="font-size: 2.4rem; text-align: center; line-height: 1;"></div>
    <h3 id="notifModalTitle" style="font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); text-align: center; margin: 0;"></h3>
    <p id="notifModalMessage" style="font-size: 0.9rem; color: var(--text-2); text-align: center; line-height: 1.55; white-space: pre-wrap; word-break: break-word;"></p>
    <div id="notifModalActions" style="display: flex; gap: 10px; margin-top: 4px;">
      <button id="notifModalCancel" class="btn btn-ghost" style="display:none; flex:1;" onclick="_notifResolve(false)">Cancel</button>
      <button id="notifModalOk" class="btn btn-danger" style="flex:1;" onclick="_notifResolve(true)">OK</button>
    </div>
  </div>
</div>

<script>
/* ---- Theme Toggle ---- */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') !== 'light';
  const next = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('eh-theme', next);
}

/* ---- Particle System ---- */
(function() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W; this.y = Math.random() * H;
      this.size = Math.random() * 1.5 + 0.3;
      this.speedX = (Math.random() - 0.5) * 0.25; this.speedY = (Math.random() - 0.5) * 0.25;
      this.opacity = Math.random() * 0.4 + 0.1;
      const colors = ['124,58,237','236,72,153','6,182,212','167,139,250'];
      this.color = colors[Math.floor(Math.random() * colors.length)];
    }
    update() {
      this.x += this.speedX; this.y += this.speedY;
      if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
    }
    draw() {
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.color},${this.opacity})`; ctx.fill();
    }
  }
  for (let i = 0; i < 60; i++) particles.push(new Particle());
  function animate() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
  }
  animate();
})();

/* ---- Reveal ---- */
const observer = new IntersectionObserver(entries => {
  entries.forEach((e, i) => { if (e.isIntersecting) { e.target.style.transitionDelay = `${i * 80}ms`; e.target.classList.add('visible'); } });
}, { threshold: 0.08 });

function gql(query, vars={}, token=null) {
  const h={'Content-Type':'application/json'};
  if(token) h['Authorization']=`JWT ${token}`;
  return fetch('/graphql/',{method:'POST',headers:h,body:JSON.stringify({query,variables:vars})}).then(r=>r.json());
}

async function checkAuth() {
  const token=localStorage.getItem('access_token');
  const loginEl=document.getElementById('loginLink'), signupEl=document.getElementById('signupLink');
  const logoutEl=document.getElementById('logoutBtn'), adminEl=document.getElementById('adminDashboardBtn');
  const myBkEl = document.getElementById('myBookingsBtn');
  const authSep = document.getElementById('authSep');
  if(token){
    if(loginEl) loginEl.style.display='none';
    if(signupEl) signupEl.style.display='none';
    if(logoutEl) logoutEl.style.display='flex';
    if(myBkEl) myBkEl.style.display='flex';
    if(authSep) authSep.style.display='block';
    try{
      const d=await gql('{ me { isStaff isSuperuser } }',{},token);
      if(d.errors){ logout(); return; }
      const u=d.data&&d.data.me;
      if(u&&(u.isStaff||u.isSuperuser)) adminEl.style.display='flex';
    }catch(_){}
  }
}
function logout(){localStorage.removeItem('access_token');localStorage.removeItem('refresh_token');location.reload();}

function fmt(date){if(!date)return'TBA';return new Date(date+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function fmtTime(t){if(!t)return'TBA';return new Date('1970-01-01T'+t).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});}

async function loadEventDetail() {
  const slug = window.location.pathname.split('/').filter(Boolean).pop();
  const token = localStorage.getItem('access_token');
  try {
    const d = await gql(`
      query($slug:String!){ eventBySlug(slug:$slug){
        id title slug featureImage shortDescription longDescription
        eventDate startTime endTime isActive viewsCount venue
        country{name} state{name} city{name}
        category{name} tags{name} extraImages{image}
      }}
    `, {slug}, token);

    document.getElementById('skeletonDetail').style.display = 'none';

    if(d.errors){ showError(d.errors[0].message); return; }
    const ev = d.data.eventBySlug;
    if(!ev){ showError('Event not found.'); return; }

    document.title = ev.title + ' — EventHub';

    const cats = ev.category&&ev.category.length ? ev.category.map(c=>`<span class="badge badge-purple">${c.name}</span>`).join('') : '';
    const tags = ev.tags&&ev.tags.length       ? ev.tags.map(t=>`<span class="badge badge-dark">${t.name}</span>`).join('') : '';

    const gallery = ev.extraImages&&ev.extraImages.length ? `
      <div style="margin-top:52px" class="reveal">
        <div class="section-label"><h2>Gallery</h2></div>
        <div class="gallery">
          ${ev.extraImages.map(img=>`<div class="gallery-item"><img src="${img.image}" alt="Gallery" loading="lazy"></div>`).join('')}
        </div>
      </div>` : '';

    const heroImg = ev.featureImage
      ? `<img src="${ev.featureImage}" alt="${ev.title}" style="width:100%;height:100%;object-fit:cover">`
      : `<div style="display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-4)"><span style="font-size:4rem">🎭</span><span>No image available</span></div>`;

    document.getElementById('eventContainer').innerHTML = `
      <div>
        ${!ev.isActive?'<div class="alert alert-warning"><span class="alert-icon">⚠️</span>This event is currently inactive and only visible to administrators.</div>':''}
        <div class="detail-hero-image-wrap reveal">${heroImg}</div>

        ${cats?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px" class="reveal">${cats}</div>`:''}
        <h1 class="detail-title reveal">${ev.title}</h1>

        <div class="detail-meta-bar reveal">
          <div class="detail-meta-item"><div class="label">Date</div><div class="value">📅 ${fmt(ev.eventDate)}</div></div>
          <div class="detail-meta-item"><div class="label">Time</div><div class="value">⏰ ${fmtTime(ev.startTime)} – ${fmtTime(ev.endTime)}</div></div>
          <div class="detail-meta-item"><div class="label">Location</div><div class="value">📍 ${[ev.city?.name,ev.state?.name].filter(Boolean).join(', ')}</div></div>
          <div class="detail-meta-item"><div class="label">Views</div><div class="value">👁 ${ev.viewsCount||0}</div></div>
        </div>

        <div class="detail-grid">
          <div>
            <div class="section-label reveal"><h2>About this Event</h2></div>
            <p class="body reveal" style="white-space:pre-wrap">${ev.longDescription||'No description available.'}</p>

            <div class="info-card reveal" style="margin-top:36px">
              <div class="section-label"><h2>Location Details</h2></div>
              <div class="info-row"><span class="label">Venue</span><span style="color:var(--text);font-weight:700;margin-top:4px">${ev.venue||'N/A'}</span></div>
              <div class="info-row"><span class="label">City</span><span style="color:var(--text-2);margin-top:4px">${ev.city?.name||'N/A'}</span></div>
              <div class="info-row"><span class="label">State</span><span style="color:var(--text-2);margin-top:4px">${ev.state?.name||'N/A'}</span></div>
              <div class="info-row"><span class="label">Country</span><span style="color:var(--text-2);margin-top:4px">${ev.country?.name||'N/A'}</span></div>
            </div>

            ${tags?`<div style="margin-top:28px" class="reveal"><div class="section-label"><h2>Tags</h2></div><div style="display:flex;flex-wrap:wrap;gap:8px">${tags}</div></div>`:''}
            ${gallery}
          </div>

          <div>
            <div class="info-card reveal">
              <div class="section-label"><h2>Schedule</h2></div>
              <div class="info-row"><span class="label">Start</span><span style="color:var(--text);font-size:1.3rem;font-weight:800;margin-top:4px">${fmtTime(ev.startTime)}</span></div>
              <div class="info-row"><span class="label">End</span><span style="color:var(--text);font-size:1.3rem;font-weight:800;margin-top:4px">${fmtTime(ev.endTime)}</span></div>
            </div>

            <div class="info-card reveal" id="bookingSection" style="margin-top:16px">
              <div class="section-label"><h2>Tickets</h2></div>
              <div id="ticketContent"><p style="color:var(--text-3);font-size:.9rem">Loading...</p></div>
            </div>
          </div>
        </div>

        <div id="adminActions" style="display:none;margin-top:52px;padding-top:32px;border-top:1px solid var(--border)">
          <p class="label" style="margin-bottom:12px">Admin Actions</p>
          <button onclick="deleteEvent('${ev.id}')" class="btn btn-danger">🗑 Delete Event</button>
        </div>
      </div>
    `;
    document.getElementById('eventContainer').style.display = 'block';

    // trigger reveals
    document.getElementById('eventContainer').querySelectorAll('.reveal').forEach(el => observer.observe(el));

    await Promise.all([checkAdminActions(), loadTicket(ev.id)]);
  } catch(err) {
    document.getElementById('skeletonDetail').style.display = 'none';
    showError('Network error: ' + err.message);
  }
}

function showError(msg) {
  document.getElementById('errorContainer').innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Oops!</div><div class="empty-state-sub">${msg}</div></div>`;
  document.getElementById('errorContainer').style.display = 'block';
}

async function loadTicket(eventId) {
  const token = localStorage.getItem('access_token');
  const el = document.getElementById('ticketContent');
  try {
    const d = await gql('query($id:ID!){ticketByEventId(eventId:$id){id price availableQuantity}}', {id:eventId}, token);
    const t = d.data&&d.data.ticketByEventId;
    if (!t) {
      el.innerHTML = `<div class="alert alert-warning"><span class="alert-icon">💡</span>Tickets not yet configured for this event.</div>`;
      return;
    }
    const loggedIn = !!token;
    const soldOut = t.availableQuantity <= 0;
    el.innerHTML = `
      <div>
        <p class="ticket-price">₹${parseFloat(t.price).toFixed(2)} <span>per ticket</span></p>
        <p style="color:var(--text-3);font-size:.875rem;margin:8px 0 24px">
          ${soldOut ? '🚫 Sold out' : `✅ ${t.availableQuantity} tickets available`}
        </p>
        <button class="btn btn-primary btn-wide" onclick="${loggedIn && !soldOut ? `openModal('${eventId}','${t.price}')` : ''}" ${!loggedIn || soldOut ? 'disabled' : ''} id="bookBtn" style="${soldOut ? 'opacity:0.4;cursor:not-allowed' : ''}">
          ${soldOut ? '🚫 Sold Out' : (loggedIn ? '🎟 Book Tickets' : 'Login to Book')}
        </button>
        ${!loggedIn && !soldOut ? `<p style="text-align:center;margin-top:12px;font-size:.8rem;color:var(--text-4)">Please <a href="/login/" style="color:var(--accent-lt);font-weight:700">login</a> to book tickets.</p>` : ''}
      </div>`;
  } catch(_) {
    el.innerHTML = `<p style="color:var(--red);font-size:.875rem">Error loading ticket info.</p>`;
  }
}

async function checkAdminActions() {
  const token = localStorage.getItem('access_token');
  if (!token) return;
  try {
    const d = await gql('{ me { isStaff isSuperuser } }', {}, token);
    const u = d.data&&d.data.me;
    if (u&&(u.isStaff||u.isSuperuser)) document.getElementById('adminActions').style.display='block';
  } catch(_) {}
}

/* ── Notification Modal Utilities ── */
let _notifResolve = null;
function _notifOpen(icon, title, msg, type, showCancel) {
  return new Promise(resolve => {
    _notifResolve = v => { _notifClose(); resolve(v); };
    const overlay = document.getElementById('notifModalOverlay');
    overlay.setAttribute('data-type', type);
    document.getElementById('notifModalIcon').textContent = icon;
    document.getElementById('notifModalTitle').textContent = title;
    document.getElementById('notifModalMessage').textContent = msg;
    document.getElementById('notifModalCancel').style.display = showCancel ? '' : 'none';
    document.getElementById('notifModalOk').textContent = showCancel ? 'Delete' : 'OK';
    overlay.classList.add('open');
  });
}
function _notifClose() {
  document.getElementById('notifModalOverlay').classList.remove('open');
}
function showNotif(msg, type='info') {
  const icons = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
  const titles = { success:'Success', error:'Error', warning:'Warning', info:'Notice' };
  return _notifOpen(icons[type]||'ℹ️', titles[type]||'Notice', msg, type, false);
}
function showConfirm(msg, title='Are you sure?', icon='🗑') {
  return _notifOpen(icon, title, msg, 'confirm', true);
}
/* close on overlay click */
document.getElementById('notifModalOverlay').addEventListener('click', function(e) {
  if (e.target === this && _notifResolve) _notifResolve(false);
});

async function deleteEvent(id) {
  const token = localStorage.getItem('access_token');
  if (!token) {
    showNotif('Access denied. Please log in as an admin.', 'error');
    return;
  }
  try {
    const check = await gql('{ me { isStaff isSuperuser } }', {}, token);
    const u = check.data && check.data.me;
    if (!u || (!u.isStaff && !u.isSuperuser)) {
      showNotif('Access denied. Only admins can delete events.', 'error');
      return;
    }
  } catch(err) {
    showNotif('Error verifying permissions.', 'error');
    return;
  }

  const ok = await showConfirm('This will permanently remove the event and all related data.', 'Delete Event?', '🗑');
  if (!ok) return;
  const d = await gql('mutation($id:ID!){deleteEvent(id:$id){success message}}', {id}, token);
  if (d.data?.deleteEvent?.success) { await showNotif('Event deleted successfully.', 'success'); window.location.href='/events/'; }
  else showNotif('Error: ' + (d.data?.deleteEvent?.message||'Unknown'), 'error');
}

/* modal */
function openModal(eventId, price) {
  document.getElementById('modalEventId').value = eventId;
  document.getElementById('modalTicketPrice').value = parseFloat(price);
  document.getElementById('quantityInput').textContent = '1';
  document.getElementById('pricePerTicket').textContent = '₹' + parseFloat(price).toFixed(2);
  recalc();
  document.getElementById('bookingModal').classList.add('open');
}
function closeModal() { document.getElementById('bookingModal').classList.remove('open'); }
function changeQty(delta) {
  const el = document.getElementById('quantityInput');
  let q = parseInt(el.textContent)||1;
  q = Math.max(1, Math.min(10, q + delta));
  el.textContent = q;
  recalc();
}
function recalc() {
  const q = parseInt(document.getElementById('quantityInput').textContent)||1;
  const p = parseFloat(document.getElementById('modalTicketPrice').value)||0;
  document.getElementById('totalPrice').textContent = '₹' + (q*p).toFixed(2);
}
async function confirmBooking() {
  const eventId  = document.getElementById('modalEventId').value;
  const quantity = parseInt(document.getElementById('quantityInput').textContent);
  const token    = localStorage.getItem('access_token');
  const btn      = document.getElementById('confirmBtn');
  btn.disabled   = true; btn.textContent = 'Initializing Payment...';
  try {
    const d = await gql(`
      mutation($eventId:String!,$quantity:Int!){bookTickets(eventId:$eventId,quantity:$quantity){
        success message booking{bookingReference totalPrice} razorpayOrderId amount currency razorpayKeyId
      }}
    `, {eventId, quantity}, token);
    const r = d.data?.bookTickets;
    if (r?.success) {
      var options = {
          "key": r.razorpayKeyId,
          "amount": r.amount,
          "currency": r.currency,
          "name": "EventHub Tickets",
          "description": "Ticket Booking",
          "order_id": r.razorpayOrderId,
          "handler": async function (response) {
              btn.textContent = 'Verifying...';
              try {
                  const verifyRes = await gql(`
                      mutation($paymentId:String!, $orderId:String!, $signature:String!, $ref:String!){
                          verifyPayment(razorpayPaymentId:$paymentId, razorpayOrderId:$orderId, razorpaySignature:$signature, bookingReference:$ref){
                              success message downloadLink
                          }
                      }
                  `, {
                      paymentId: response.razorpay_payment_id,
                      orderId: response.razorpay_order_id,
                      signature: response.razorpay_signature,
                      ref: r.booking.bookingReference
                  }, token);
                  
                  const v = verifyRes.data?.verifyPayment;
                  if (v?.success) {
                      closeModal();
                      await showNotif(`Payment Successful!\nRef: ${r.booking.bookingReference}\nTotal: ₹${r.booking.totalPrice}`, 'success');
                      const slug = window.location.pathname.split('/').filter(Boolean).pop();
                      const ev   = await gql('query($slug:String!){eventBySlug(slug:$slug){id}}', {slug}, token);
                      if (ev.data?.eventBySlug) loadTicket(ev.data.eventBySlug.id);
                  } else {
                      showNotif('Payment verification failed: ' + (v?.message || ''), 'error');
                  }
              } catch(e) {
                  showNotif('Verification Error: ' + e.message, 'error');
              } finally {
                  btn.disabled = false; btn.textContent = 'Confirm Booking';
              }
          },
          "modal": {
              "ondismiss": function(){
                  btn.disabled = false; btn.textContent = 'Confirm Booking';
              }
          },
          "theme": { "color": "#7c3aed" }
      };
      var rzp1 = new Razorpay(options);
      rzp1.on('payment.failed', function (response){
          showNotif('Payment Failed: ' + response.error.description, 'error');
          btn.disabled = false; btn.textContent = 'Confirm Booking';
      });
      rzp1.open();
    } else {
      showNotif('Error: ' + (r?.message||'Booking failed'), 'error');
      btn.disabled = false; btn.textContent = 'Confirm Booking';
    }
  } catch(err) { 
      showNotif('Error: ' + err.message, 'error'); 
      btn.disabled = false; btn.textContent = 'Confirm Booking';
  }
}

async function testBypassBooking() {
  const eventId  = document.getElementById('modalEventId').value;
  const quantity = parseInt(document.getElementById('quantityInput').textContent);
  const token    = localStorage.getItem('access_token');
  const btn      = document.getElementById('testBypassBtn');
  btn.disabled   = true; btn.textContent = 'Processing...';
  try {
    const d = await gql(`
      mutation($eventId:String!,$quantity:Int!){bookTickets(eventId:$eventId,quantity:$quantity){
        success message booking{bookingReference totalPrice} razorpayOrderId amount currency razorpayKeyId
      }}
    `, {eventId, quantity}, token);
    const r = d.data?.bookTickets;
    if (r?.success) {
      const verifyRes = await gql(`
          mutation($paymentId:String!, $orderId:String!, $signature:String!, $ref:String!){
              verifyPayment(razorpayPaymentId:$paymentId, razorpayOrderId:$orderId, razorpaySignature:$signature, bookingReference:$ref){
                  success message downloadLink
              }
          }
      `, {
          paymentId: 'test_success',
          orderId: r.razorpayOrderId,
          signature: 'test_signature',
          ref: r.booking.bookingReference
      }, token);
      
      const v = verifyRes.data?.verifyPayment;
      if (v?.success) {
          closeModal();
          await showNotif(`Test Payment Successful!\nRef: ${r.booking.bookingReference}\nTotal: ₹${r.booking.totalPrice}\n\nYour PDF invoice has been generated and the confirmation email has been sent!`, 'success');
          
          if (v.downloadLink) {
              window.open(v.downloadLink, '_blank');
          }
          
          const slug = window.location.pathname.split('/').filter(Boolean).pop();
          const ev   = await gql('query($slug:String!){eventBySlug(slug:$slug){id}}', {slug}, token);
          if (ev.data?.eventBySlug) loadTicket(ev.data.eventBySlug.id);
      } else {
          showNotif('Payment verification failed: ' + (v?.message || ''), 'error');
      }
    } else {
      showNotif('Error: ' + (r?.message||'Booking failed'), 'error');
    }
  } catch(err) { 
      showNotif('Error: ' + err.message, 'error'); 
  } finally {
      btn.disabled = false; btn.textContent = 'Test Success';
  }
}

document.addEventListener('DOMContentLoaded', () => { checkAuth(); loadEventDetail(); });
