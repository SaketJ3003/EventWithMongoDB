<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details</title>
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="bg-white text-gray-900 font-sans">
    <nav class="border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
            <h1 class="text-3xl font-mono tracking-tight"><a href="/events/" class="hover:text-gray-600 transition">EVENTS</a></h1>
            <div class="space-x-4 flex items-center">
                <a href="/admin-panel/dashboard/" class="hidden text-sm text-blue-600 hover:text-blue-900 font-medium" id="adminDashboardBtn">Admin Dashboard</a>
                <a href="/login/" class="text-sm text-gray-600 hover:text-gray-900">Login</a>
                <a href="/signup/" class="text-sm text-gray-600 hover:text-gray-900">Sign Up</a>
                <button onclick="logout()" class="hidden text-sm text-red-600 hover:text-red-900" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <a href="/events/" class="inline-flex items-center gap-2 text-gray-500 hover:text-gray-900 mb-8 font-medium">
            <span class="text-2xl">←</span> 
            <span>Back</span>
        </a>

        <div id="loadingContainer" class="text-center py-16">
            <p class="text-gray-500 text-lg">Loading event details...</p>
        </div>
        
        <div id="eventContainer"></div>
    </div>

    <script>
        async function graphqlFetch(query, variables = {}, token = null) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `JWT ${token}`;
            const res = await fetch('/graphql/', {
                method: 'POST',
                headers,
                body: JSON.stringify({ query, variables })
            });
            return res.json();
        }

        async function checkAuth() {
            const accessToken = localStorage.getItem('access_token');
            const loginLink        = document.querySelector('a[href="/login/"]');
            const signupLink       = document.querySelector('a[href="/signup/"]');
            const logoutBtn        = document.getElementById('logoutBtn');
            const adminDashboardBtn = document.getElementById('adminDashboardBtn');

            if (accessToken) {
                if (loginLink)  loginLink.style.display  = 'none';
                if (signupLink) signupLink.style.display = 'none';
                if (logoutBtn)  logoutBtn.classList.remove('hidden');

                try {
                    const data = await graphqlFetch(`
                        query { me { id isStaff isSuperuser } }
                    `, {}, accessToken);
                    const user = data.data && data.data.me;
                    if (user && (user.isStaff || user.isSuperuser)) {
                        if (adminDashboardBtn) adminDashboardBtn.classList.remove('hidden');
                    }
                } catch (error) {
                    console.error('Error checking user status:', error);
                }
            } else {
                if (loginLink)  loginLink.style.display  = 'inline';
                if (signupLink) signupLink.style.display = 'inline';
                if (logoutBtn)  logoutBtn.classList.add('hidden');
                if (adminDashboardBtn) adminDashboardBtn.classList.add('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            location.reload();
        }

        async function loadEventDetail() {
            const slug = window.location.pathname.split('/').filter(Boolean).pop();

            try {
                const accessToken = localStorage.getItem('access_token');
                const data = await graphqlFetch(`
                    query EventDetail($slug: String!) {
                        eventBySlug(slug: $slug) {
                            id
                            title
                            slug
                            featureImage
                            shortDescription
                            longDescription
                            eventDate
                            startTime
                            endTime
                            isActive
                            viewsCount
                            venue
                            country  { name }
                            state    { name }
                            city     { name }
                            category { name }
                            tags     { name }
                            extraImages { image }
                        }
                    }
                `, { slug }, accessToken || null);

                console.log('GraphQL event data:', data);

                const container  = document.getElementById('eventContainer');
                const loadingDiv = document.getElementById('loadingContainer');

                if (data.errors) {
                    loadingDiv.innerHTML = `<p class="text-red-500 text-lg">Error: ${data.errors[0].message}</p>`;
                    return;
                }

                const event = data.data.eventBySlug;

                if (!event) {
                    loadingDiv.innerHTML = '<p class="text-gray-500 text-lg">Event not found.</p>';
                    return;
                }

                loadingDiv.style.display = 'none';
                document.title = (event.title || 'Event') + ' - Event Details';

                container.innerHTML = `
                    <div class="max-w-6xl">
                        ${!event.isActive ? '<div class="mb-6 p-4 bg-red-50 border border-red-200 rounded-3xl"><p class="text-red-800"><strong>Status:</strong> This event is currently inactive and only visible to administrators.</p></div>' : ''}
                        <div class="mb-12">
                            <div class="w-full h-80 md:h-96 bg-gray-900 rounded-3xl overflow-hidden shadow-lg mb-8">
                                ${event.featureImage
                                    ? `<img src="${event.featureImage}" alt="${event.title}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300" onerror="this.src='/static/placeholder.png'">`
                                    : '<div class="w-full h-full bg-gradient-to-br from-gray-700 to-gray-900 flex items-center justify-center"><span class="text-gray-400 text-lg">No image available</span></div>'}
                            </div>

                            <div class="space-y-4">
                                <h1 class="text-5xl lg:text-6xl font-light text-gray-900 tracking-tight">${event.title || 'Event'}</h1>
                                <div class="flex flex-wrap gap-6 pt-4">
                                    <div class="flex items-center gap-3">
                                        <div>
                                            <div class="text-xs text-gray-500 uppercase">Date</div>
                                            <div class="font-medium text-gray-900">
                                                ${event.eventDate
                                                    ? new Date(event.eventDate).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })
                                                    : 'N/A'}
                                            </div>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <div>
                                            <div class="text-xs text-gray-500 uppercase">Views</div>
                                            <div class="font-medium text-gray-900">${event.viewsCount || 0}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                            <div class="lg:col-span-2 space-y-12">
                                <div>
                                    <div class="flex items-center gap-3 mb-6">
                                        <div class="w-1 h-6 bg-gray-900"></div>
                                        <h2 class="text-lg font-semibold text-gray-900 uppercase tracking-wider">About Event</h2>
                                    </div>
                                    <p class="text-gray-700 leading-relaxed text-base">${event.longDescription || 'No description available'}</p>
                                </div>

                                <div class="bg-white border border-gray-200 rounded-3xl p-6 hover:border-gray-400 transition-all duration-300 hover:shadow-lg">
                                    <div class="flex items-center gap-3 mb-6">
                                        <div class="w-1 h-6 bg-gray-900"></div>
                                        <h2 class="text-lg font-semibold text-gray-900 uppercase tracking-wider">Event Location</h2>
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div>
                                            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Venue</div>
                                            <div class="text-gray-900 text-lg font-medium">${event.venue || 'N/A'}</div>
                                        </div>
                                        <div>
                                            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">City</div>
                                            <div class="text-gray-900 text-lg font-medium">${event.city?.name || ''}</div>
                                        </div>
                                        <div>
                                            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">State</div>
                                            <div class="text-gray-900 text-lg font-medium">${event.state?.name || ''}</div>
                                        </div>
                                        <div>
                                            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Country</div>
                                            <div class="text-gray-900 text-lg font-medium">${event.country?.name || 'N/A'}</div>
                                        </div>
                                    </div>
                                </div>

                                ${event.extraImages && event.extraImages.length > 0 ? `
                                    <div>
                                        <div class="flex items-center gap-3 mb-8">
                                            <div class="w-1 h-6 bg-gray-900"></div>
                                            <h2 class="text-lg font-semibold text-gray-900 uppercase tracking-wider">Gallery</h2>
                                        </div>
                                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                                            ${event.extraImages.map(img => `
                                                <div class="overflow-hidden rounded-3xl shadow-md">
                                                    <div class="aspect-square bg-gray-100 overflow-hidden">
                                                        <img src="${img.image}" alt="Event Gallery" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300" onerror="this.src='/static/placeholder.png'">
                                                    </div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>

                            <div class="space-y-6">
                                <div class="bg-white border border-gray-200 rounded-3xl p-6 hover:border-gray-400 transition-all duration-300 hover:shadow-lg">
                                    <h3 class="text-base font-semibold text-gray-900 uppercase tracking-wider mb-6">Schedule</h3>
                                    <div class="space-y-5">
                                        <div class="pb-4 border-b border-gray-100">
                                            <div class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-2">Start Time</div>
                                            <div class="text-lg font-medium text-gray-900">
                                                ${event.startTime
                                                    ? new Date('1970-01-01T' + event.startTime).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true })
                                                    : 'N/A'}
                                            </div>
                                        </div>
                                        <div>
                                            <div class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-2">End Time</div>
                                            <div class="text-lg font-medium text-gray-900">
                                                ${event.endTime
                                                    ? new Date('1970-01-01T' + event.endTime).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true })
                                                    : 'N/A'}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                ${event.category && event.category.length > 0 ? `
                                    <div class="bg-white border border-gray-200 rounded-3xl p-6 hover:border-gray-400 transition-all duration-300 hover:shadow-lg">
                                        <h3 class="text-base font-semibold text-gray-900 uppercase tracking-wider mb-4">Category</h3>
                                        <div class="flex flex-wrap gap-2">
                                            ${event.category.map(cat => `
                                                <span class="inline-flex items-center bg-gray-100 text-gray-700 px-4 py-2 rounded-3xl text-sm font-medium">${cat.name}</span>
                                            `).join('')}
                                        </div>
                                    </div>
                                ` : ''}

                                ${event.tags && event.tags.length > 0 ? `
                                    <div class="bg-white border border-gray-200 rounded-3xl p-6 hover:border-gray-400 transition-all duration-300 hover:shadow-lg">
                                        <h3 class="text-base font-semibold text-gray-900 uppercase tracking-wider mb-4">Tags</h3>
                                        <div class="flex flex-wrap gap-2">
                                            ${event.tags.map(tag => `
                                                <span class="capitalize inline-flex items-center bg-gray-900 text-white px-3 py-1.5 rounded-3xl text-xs font-medium">${tag.name}</span>
                                            `).join('')}
                                        </div>
                                    </div>
                                ` : ''}

                                <div id="bookingSection" class="bg-white border border-gray-200 rounded-3xl p-6 hover:border-gray-400 transition-all duration-300 hover:shadow-lg">
                                    <h3 class="text-base font-semibold text-gray-900 uppercase tracking-wider mb-6">Ticket Booking</h3>
                                    <div id="ticketContent">
                                        <p class="text-gray-600 mb-4">Loading ticket information...</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div id="adminActions" class="hidden mt-12 pt-8 border-t border-gray-200">
                            <h3 class="text-lg font-semibold text-gray-900 mb-4 uppercase tracking-wider">Admin Actions</h3>
                            <div class="flex flex-wrap gap-4">
                                <button onclick="deleteEvent('${event.id}')" class="px-6 py-3 bg-red-600 text-white rounded-3xl hover:bg-red-700 transition font-medium">Delete Event</button>
                            </div>
                        </div>
                    </div>
                `;

                await checkAdminAndShowActions();
                await loadTicketInfo(event.id);

            } catch (error) {
                console.error('Error loading event:', error);
                document.getElementById('loadingContainer').innerHTML = `<p class="text-red-500 text-lg">Error loading event: ${error.message}</p>`;
            }
        }

        async function loadTicketInfo(eventId) {
            const accessToken = localStorage.getItem('access_token');
            const ticketContent = document.getElementById('ticketContent');
            
            try {
                console.log('Loading ticket info for event:', eventId);
                
                const data = await graphqlFetch(`
                    query TicketByEventId($eventId: ID!) {
                        ticketByEventId(eventId: $eventId) {
                            id
                            price
                            availableQuantity
                        }
                    }
                `, { eventId }, accessToken || null);

                console.log('Ticket response:', data);

                if (data.errors) {
                    console.error('GraphQL errors:', data.errors);
                    ticketContent.innerHTML = '<p class="text-yellow-600 text-sm">⚠️ Ticket information unavailable. Error: ' + data.errors[0].message + '</p>';
                    return;
                }

                const ticket = data.data && data.data.ticketByEventId;

                if (!ticket) {
                    console.warn('No ticket found for event:', eventId);
                    ticketContent.innerHTML = `
                        <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
                            <p class="text-yellow-800 text-sm">💡 Tickets are not yet configured for this event.</p>
                            <p class="text-xs text-yellow-700 mt-2">Please check back soon or contact the administrator.</p>
                        </div>
                    `;
                    return;
                }

                const isLoggedIn = accessToken !== null;
                console.log('Is logged in:', isLoggedIn);
                console.log('Ticket:', ticket);

                ticketContent.innerHTML = `
                    <div class="space-y-4">
                        <div class="pb-4 border-b border-gray-100">
                            <div class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-2">Price Per Ticket</div>
                            <div class="text-2xl font-bold text-gray-900">₹${parseFloat(ticket.price).toFixed(2)}</div>
                        </div>
                        <div class="pb-4 border-b border-gray-100">
                            <div class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-2">Available Tickets</div>
                            <div class="text-lg font-medium text-gray-900">${ticket.availableQuantity} available</div>
                        </div>
                        <button 
                            id="bookButton"
                            onclick="${isLoggedIn ? `openBookingModal('${eventId}', '${ticket.price}')` : 'alert("Please log in to book tickets")'}"
                            class="w-full px-6 py-3 bg-blue-600 text-white rounded-3xl hover:bg-blue-700 transition font-semibold cursor-pointer"
                        >
                            ${isLoggedIn ? 'Book Tickets' : 'Login to Book'}
                        </button>
                        ${!isLoggedIn ? '<p class="text-xs text-gray-600 text-center mt-2">Please <a href="/login/" class="text-blue-600 hover:underline">login</a> to book tickets.</p>' : ''}
                    </div>
                `;

            } catch (error) {
                console.error('Error loading ticket info:', error);
                ticketContent.innerHTML = '<p class="text-red-600 text-sm">Error loading ticket information: ' + error.message + '</p>';
            }
        }

        function openBookingModal(eventId, ticketPrice) {
            console.log('openBookingModal called with:', { eventId, ticketPrice });
            
            const modal = document.getElementById('bookingModal');
            if (!modal) {
                console.error('Booking modal not found!');
                return;
            }
            
            try {
                const priceNum = parseFloat(ticketPrice);
                
                if (!eventId || isNaN(priceNum)) {
                    console.error('Invalid eventId or ticketPrice:', { eventId, ticketPrice });
                    alert('Error: Invalid event or ticket information');
                    return;
                }
                
                console.log('Setting modal values:', { eventId, priceNum });
                modal.classList.remove('hidden');
                document.getElementById('modalEventId').value = eventId;
                document.getElementById('modalTicketPrice').value = priceNum;
                document.getElementById('quantityInput').textContent = '1';
                document.getElementById('pricePerTicket').textContent = '₹' + priceNum.toFixed(2);
                updateTotalPrice(priceNum);
            } catch (error) {
                console.error('Error in openBookingModal:', error);
                alert('Error opening booking modal: ' + error.message);
            }
        }

        function closeBookingModal() {
            const modal = document.getElementById('bookingModal');
            if (modal) {
                modal.classList.add('hidden');
            }
        }

        function updateTotalPrice(ticketPrice) {
            try {
                const quantity = parseInt(document.getElementById('quantityInput').textContent) || 1;
                const price = parseFloat(ticketPrice);
                
                if (isNaN(price)) {
                    console.error('Invalid ticket price:', ticketPrice);
                    return;
                }
                
                const total = (price * quantity).toFixed(2);
                console.log('Updated total price:', { price, quantity, total });
                document.getElementById('totalPrice').textContent = '₹' + total;
            } catch (error) {
                console.error('Error updating total price:', error);
            }
        }

        function incrementQuantity() {
            const quantityElement = document.getElementById('quantityInput');
            let quantity = parseInt(quantityElement.textContent) || 1;
            if (quantity < 10) {
                quantity++;
                quantityElement.textContent = quantity;
                const ticketPrice = document.getElementById('modalTicketPrice').value;
                updateTotalPrice(ticketPrice);
            }
        }

        function decrementQuantity() {
            const quantityElement = document.getElementById('quantityInput');
            let quantity = parseInt(quantityElement.textContent) || 1;
            if (quantity > 1) {
                quantity--;
                quantityElement.textContent = quantity;
                const ticketPrice = document.getElementById('modalTicketPrice').value;
                updateTotalPrice(ticketPrice);
            }
        }

        async function confirmBooking(evt) {
            const eventId = document.getElementById('modalEventId').value;
            const quantity = parseInt(document.getElementById('quantityInput').textContent);
            const ticketPrice = parseFloat(document.getElementById('modalTicketPrice').value);
            const accessToken = localStorage.getItem('access_token');

            if (!accessToken) {
                alert('You must be logged in to book tickets');
                return;
            }

            if (quantity <= 0) {
                alert('Please select a valid quantity');
                return;
            }

            const bookButton = evt && evt.target ? evt.target : document.querySelector('button[onclick*="confirmBooking"]');
            if (bookButton) {
                bookButton.disabled = true;
                bookButton.textContent = 'Booking...';
            }

            try {
                const data = await graphqlFetch(`
                    mutation BookTickets($eventId: String!, $quantity: Int!) {
                        bookTickets(eventId: $eventId, quantity: $quantity) {
                            success
                            message
                            booking {
                                id
                                bookingReference
                                totalPrice
                                createdAt
                            }
                            downloadLink
                        }
                    }
                `, { eventId: eventId, quantity }, accessToken);

                console.log('Booking response:', data);

                // Check for GraphQL errors
                if (data.errors && data.errors.length > 0) {
                    const errorMsg = data.errors.map(e => e.message).join(', ');
                    console.error('GraphQL errors:', data.errors);
                    alert('Booking error: ' + errorMsg);
                    return;
                }

                const result = data.data && data.data.bookTickets;

                if (result && result.success) {
                    const booking = result.booking;
                    alert(`Booking confirmed!\n\nBooking Reference: ${booking.bookingReference}\nTotal: ₹${booking.totalPrice}\n\nYou will receive a confirmation email shortly with your invoice.`);
                    
                    closeBookingModal();
                    
                    // Reload ticket info to update available quantity
                    const eventSlug = window.location.pathname.split('/').filter(Boolean).pop();
                    const eventData = await graphqlFetch(`
                        query EventDetail($slug: String!) {
                            eventBySlug(slug: $slug) {
                                id
                            }
                        }
                    `, { slug: eventSlug }, accessToken);
                    
                    if (eventData.data && eventData.data.eventBySlug) {
                        await loadTicketInfo(eventData.data.eventBySlug.id);
                    }
                } else {
                    const errorMessage = result && result.message ? result.message : 'Unknown booking error';
                    console.error('Booking failed:', result);
                    alert('Booking error: ' + errorMessage);
                }
            } catch (error) {
                console.error('Error booking tickets:', error);
                alert('Error booking tickets: ' + error.message);
            } finally {
                if (bookButton) {
                    bookButton.disabled = false;
                    bookButton.textContent = 'Confirm Booking';
                }
            }
        }

        async function checkAdminAndShowActions() {
            const accessToken = localStorage.getItem('access_token');
            if (!accessToken) return;

            try {
                const data = await graphqlFetch(`
                    query { me { id isStaff isSuperuser } }
                `, {}, accessToken);
                const user = data.data && data.data.me;
                if (user && (user.isStaff || user.isSuperuser)) {
                    const adminActions = document.getElementById('adminActions');
                    if (adminActions) adminActions.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error checking admin status:', error);
            }
        }

        async function deleteEvent(eventId) {
            if (!confirm('Are you sure you want to delete this event?')) return;

            const accessToken = localStorage.getItem('access_token');
            if (!accessToken) { alert('You must be logged in to delete an event'); return; }

            try {
                const data = await graphqlFetch(`
                    mutation DeleteEvent($id: ID!) {
                        deleteEvent(id: $id) {
                            success
                            message
                        }
                    }
                `, { id: eventId }, accessToken);

                const result = data.data && data.data.deleteEvent;
                if (result && result.success) {
                    alert('Event deleted successfully');
                    window.location.href = '/events/';
                } else {
                    alert('Error deleting event: ' + (result ? result.message : 'Unknown error'));
                }
            } catch (error) {
                console.error('Error deleting event:', error);
                alert('Error deleting event: ' + error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadEventDetail();
        });
    </script>

    <!-- Booking Modal -->
    <div id="bookingModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onclick="if(event.target.id === 'bookingModal') closeBookingModal()">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-semibold text-gray-900">Book Tickets</h2>
                <button onclick="closeBookingModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            
            <form onsubmit="return false;">
                <input type="hidden" id="modalEventId" value="">
                <input type="hidden" id="modalTicketPrice" value="">
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Number of Tickets</label>
                        <div class="flex items-center gap-3">
                            <button type="button" onclick="decrementQuantity()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg font-bold text-xl transition">−</button>
                            <span id="quantityInput" class="flex-1 text-center text-lg font-semibold text-gray-900">1</span>
                            <button type="button" onclick="incrementQuantity()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg font-bold text-xl transition">+</button>
                        </div>
                    </div>
                    
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-gray-600">Price per ticket:</span>
                            <span class="text-gray-900 font-medium" id="pricePerTicket">-</span>
                        </div>
                        <div class="flex justify-between items-center pt-2 border-t border-gray-200">
                            <span class="text-lg font-semibold text-gray-900">Total Amount:</span>
                            <span class="text-2xl font-bold text-blue-600" id="totalPrice">-</span>
                        </div>
                    </div>
                    
                    <button 
                        type="button" 
                        onclick="confirmBooking(event)" 
                        class="w-full px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-semibold"
                    >
                        Confirm Booking
                    </button>
                    <button 
                        type="button" 
                        onclick="closeBookingModal()" 
                        class="w-full px-6 py-3 bg-gray-200 text-gray-900 rounded-lg hover:bg-gray-300 transition font-semibold"
                    >
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
