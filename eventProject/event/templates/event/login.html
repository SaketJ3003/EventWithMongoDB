<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — EventHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('eh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>

<!-- Animated Background -->
<div class="page-bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<canvas id="particleCanvas"></canvas>

<!-- Floating Dock -->
<nav class="dock">
  <span class="dock-logo">EventHub</span>
  <div class="dock-sep"></div>
  <a href="/events/" class="dock-item">
    <span class="dock-icon">🎪</span>
    <span>Events</span>
  </a>
  <div class="dock-sep"></div>
  <a href="/login/" class="dock-item active">
    <span class="dock-icon">🔑</span>
    <span>Login</span>
  </a>
  <a href="/signup/" class="dock-item">
    <span class="dock-icon">✨</span>
    <span>Sign Up</span>
  </a>
  <div class="dock-sep"></div>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode" aria-label="Toggle theme">
    <span class="theme-toggle-icon theme-toggle-moon">🌙</span>
    <div class="theme-toggle-track"><div class="theme-toggle-thumb"></div></div>
    <span class="theme-toggle-icon theme-toggle-sun">☀️</span>
  </button>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <!-- Logo mark -->
    <div style="width:56px;height:56px;background:var(--grad-hero);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin-bottom:28px;box-shadow:0 8px 24px var(--accent-glow)">🎟</div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your EventHub account</p>

    <div id="alertSuccess" class="alert alert-success" style="display:none">
      <span class="alert-icon">✓</span><span id="alertSuccessText"></span>
    </div>
    <div id="alertError" class="alert alert-error" style="display:none">
      <span class="alert-icon">✕</span><span id="alertErrorText"></span>
    </div>

    <form id="loginForm" style="display:flex;flex-direction:column;gap:20px">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="email">Email <span>*</span></label>
        <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
        <small class="form-error" id="email-error" style="display:none"></small>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password <span>*</span></label>
        <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" required>
        <small class="form-error" id="password-error" style="display:none"></small>
      </div>
      <button type="submit" id="submitBtn" class="btn btn-primary btn-wide btn-lg" style="margin-top:4px">Sign In</button>
    </form>

    <div class="auth-footer">Don't have an account? <a href="/signup/">Create one free</a></div>
  </div>
</div>

<script>
/* ---- Theme Toggle ---- */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') !== 'light';
  const next = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('eh-theme', next);
}

/* ---- Particle System ---- */
(function() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W; this.y = Math.random() * H;
      this.size = Math.random() * 1.5 + 0.3;
      this.speedX = (Math.random() - 0.5) * 0.3; this.speedY = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.5 + 0.1;
      const colors = ['124,58,237','236,72,153','6,182,212','167,139,250'];
      this.color = colors[Math.floor(Math.random() * colors.length)];
    }
    update() {
      this.x += this.speedX; this.y += this.speedY;
      if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
    }
    draw() {
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.color},${this.opacity})`; ctx.fill();
    }
  }
  for (let i = 0; i < 60; i++) particles.push(new Particle());
  function animate() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
  }
  animate();
})();

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('alertError'), sucEl = document.getElementById('alertSuccess');
  errEl.style.display = 'none'; sucEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in…';

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/graphql/', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ query:`
        mutation Login($email:String!,$password:String!){
          login(email:$email,password:$password){
            success message accessToken refreshToken user{id username isStaff isSuperuser}
          }
        }`, variables:{email, password}
      })
    });
    const d = await res.json();
    if (d.errors) { showErr(d.errors[0].message); return; }
    const r = d.data.login;
    if (r.success) {
      localStorage.setItem('access_token',  r.accessToken);
      localStorage.setItem('refresh_token', r.refreshToken);
      const isAdmin = r.user && (r.user.isStaff || r.user.isSuperuser);
      document.getElementById('alertSuccessText').textContent = isAdmin ? 'Login successful! Redirecting to dashboard…' : 'Login successful! Redirecting…';
      sucEl.style.display = 'flex';
      setTimeout(() => window.location.href = isAdmin ? '/admin-panel/dashboard/' : '/events/', 900);
    } else {
      showErr(r.message || 'Login failed. Please check your credentials.');
    }
  } catch(err) { showErr('Network error. Please try again.'); }
  finally { btn.disabled=false; btn.textContent='Sign In'; }

  function showErr(msg) {
    document.getElementById('alertErrorText').textContent = msg;
    errEl.style.display='flex';
  }
});
</script>
</body>
</html>
