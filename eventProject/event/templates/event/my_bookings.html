<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings — EventHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('eh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>

<!-- Animated Background -->
<div class="page-bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<canvas id="particleCanvas"></canvas>

<!-- Floating Dock -->
<nav class="dock" id="mainDock">
  <span class="dock-logo">EventHub</span>
  <div class="dock-sep"></div>
  <a href="/events/" class="dock-item">
    <span class="dock-icon">🎪</span>
    <span>Events</span>
  </a>
  <a href="/my-bookings/" class="dock-item active" id="myBookingsBtn" style="display:none">
    <span class="dock-icon">🎟</span>
    <span>Bookings</span>
  </a>
  <a href="/admin-panel/dashboard/" class="dock-item dock-item-admin" id="adminDashboardBtn" style="display:none">
    <span class="dock-icon">⚡</span>
    <span>Admin</span>
  </a>
  <div class="dock-sep"></div>
  <button onclick="logout()" class="dock-item dock-item-danger" id="logoutBtn" style="display:none">
    <span class="dock-icon">👋</span>
    <span>Sign Out</span>
  </button>
  <div class="dock-sep"></div>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode" aria-label="Toggle theme">
    <span class="theme-toggle-icon theme-toggle-moon">🌙</span>
    <div class="theme-toggle-track"><div class="theme-toggle-thumb"></div></div>
    <span class="theme-toggle-icon theme-toggle-sun">☀️</span>
  </button>
</nav>

<!-- Content -->
<section class="section">
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:48px" class="reveal">
      <div>
        <div class="section-heading-label" style="font-size:0.7rem;font-weight:800;color:var(--accent-lt);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px">
          <span style="display:inline-block;width:24px;height:2px;background:var(--grad-hero);border-radius:2px"></span>
          My Account
        </div>
        <h1 style="font-size:clamp(1.8rem,4vw,2.5rem);font-weight:800;letter-spacing:-0.02em">My Bookings</h1>
      </div>
      <a href="/events/" class="btn btn-primary">Browse Events</a>
    </div>

    <!-- Skeleton -->
    <div id="skeletonGrid" style="display:flex;flex-direction:column;gap:16px">
      <div class="skeleton" style="height:140px;border-radius:20px"></div>
      <div class="skeleton" style="height:140px;border-radius:20px;opacity:0.6"></div>
    </div>

    <div id="bookingsContainer" style="display:none;flex-direction:column;gap:16px"></div>
    <div id="errorContainer" style="display:none"></div>
  </div>
</section>

<script>
/* ---- Theme Toggle ---- */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') !== 'light';
  const next = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('eh-theme', next);
}

/* ---- Particle System ---- */
(function() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W; this.y = Math.random() * H;
      this.size = Math.random() * 1.5 + 0.3;
      this.speedX = (Math.random() - 0.5) * 0.3; this.speedY = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.4 + 0.1;
      const colors = ['124,58,237','236,72,153','167,139,250'];
      this.color = colors[Math.floor(Math.random() * colors.length)];
    }
    update() {
      this.x += this.speedX; this.y += this.speedY;
      if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
    }
    draw() {
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.color},${this.opacity})`; ctx.fill();
    }
  }
  for (let i = 0; i < 50; i++) particles.push(new Particle());
  function animate() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
  }
  animate();
})();

/* ---- Reveal ---- */
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

function gql(query, vars = {}, token = null) {
  const h = { 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = `JWT ${token}`;
  return fetch('/graphql/', { method:'POST', headers:h, body:JSON.stringify({query, variables:vars}) }).then(r=>r.json());
}

async function checkAuth() {
  const token = localStorage.getItem('access_token');
  if (!token) { window.location.href = '/login/'; return; }
  const logoutEl  = document.getElementById('logoutBtn');
  const adminEl   = document.getElementById('adminDashboardBtn');
  const myBkEl    = document.getElementById('myBookingsBtn');
  if (logoutEl) logoutEl.style.display = 'flex';
  if (myBkEl)   myBkEl.style.display   = 'flex';
  try {
    const d = await gql('{ me { isStaff isSuperuser } }', {}, token);
    if (d.errors) { logout(); return; }
    const u = d.data && d.data.me;
    if (u && (u.isStaff || u.isSuperuser)) adminEl.style.display = 'flex';
  } catch(_) {}
}

function logout() {
  localStorage.removeItem('access_token');
  localStorage.removeItem('refresh_token');
  window.location.href = '/events/';
}

function fmt(date) {
  if (!date) return 'TBA';
  return new Date(date).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

async function loadBookings() {
  const token = localStorage.getItem('access_token');
  if (!token) return;

  try {
    const d = await gql(`
      query {
        myBookings {
          id bookingReference quantity totalPrice status createdAt
          event { title slug featureImage eventDate }
        }
      }
    `, {}, token);

    document.getElementById('skeletonGrid').style.display = 'none';

    if (d.errors) { showError('Failed to load bookings.'); return; }

    const bookings = d.data.myBookings;
    const container = document.getElementById('bookingsContainer');

    if (!bookings || bookings.length === 0) {
      showError('You have no bookings yet.');
      return;
    }

    container.innerHTML = bookings.map((b, i) => {
      const ev = b.event;
      const evDate = ev.eventDate ? new Date(ev.eventDate+'T00:00:00').toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'}) : 'TBA';
      const img = ev.featureImage
          ? `<img src="${ev.featureImage}" style="width:120px;height:120px;object-fit:cover;border-radius:14px;flex-shrink:0">`
          : `<div style="width:120px;height:120px;border-radius:14px;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0">🎭</div>`;

      let badgeClass = 'badge-dark';
      if(b.status === 'confirmed') badgeClass = 'badge-green';
      else if(b.status === 'pending') badgeClass = 'badge-amber';
      else if(b.status === 'cancelled') badgeClass = 'badge-red';

      return `
        <div class="info-card reveal" style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;transition-delay:${i * 80}ms">
          ${img}
          <div style="flex:1;min-width:200px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
              <div>
                <a href="/events/${ev.slug}/" style="text-decoration:none">
                  <h3 style="font-size:1.2rem;color:var(--text);font-weight:800;margin-bottom:4px;transition:color var(--t)"
                      onmouseover="this.style.color='var(--accent-lt)'" onmouseout="this.style.color='var(--text)'">${ev.title}</h3>
                </a>
                <p style="color:var(--text-4);font-size:.8rem;letter-spacing:.05em;text-transform:uppercase;font-weight:600">Event Date: ${evDate}</p>
              </div>
              <span class="badge ${badgeClass}">${b.status}</span>
            </div>

            <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(110px, 1fr));gap:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);padding:14px;border-radius:12px;margin-bottom:16px">
              <div>
                <div style="font-size:.68rem;color:var(--text-4);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:4px">Reference</div>
                <div style="font-family:'Space Grotesk',sans-serif;font-weight:800;color:var(--accent-lt);font-size:.9rem">${b.bookingReference}</div>
              </div>
              <div>
                <div style="font-size:.68rem;color:var(--text-4);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:4px">Tickets</div>
                <div style="font-weight:700;color:var(--text)">${b.quantity}</div>
              </div>
              <div>
                <div style="font-size:.68rem;color:var(--text-4);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:4px">Total Paid</div>
                <div style="font-weight:800;color:var(--text)">₹${parseFloat(b.totalPrice).toFixed(2)}</div>
              </div>
              <div>
                <div style="font-size:.68rem;color:var(--text-4);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:4px">Booked On</div>
                <div style="color:var(--text-2);font-size:.8rem">${fmt(b.createdAt)}</div>
              </div>
            </div>

            <div style="display:flex;gap:10px;flex-wrap:wrap">
              <a href="/invoice/${b.bookingReference}/download/" target="_blank" class="btn btn-secondary btn-sm">⬇ Download Invoice</a>
              <a href="/events/${ev.slug}/" class="btn btn-ghost btn-sm">View Event →</a>
            </div>
          </div>
        </div>
      `;
    }).join('');

    container.style.display = 'flex';
    container.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  } catch(err) {
    document.getElementById('skeletonGrid').style.display = 'none';
    showError('Network error. Please try again later.');
  }
}

function showError(msg) {
  const el = document.getElementById('errorContainer');
  el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🎟️</div><div class="empty-state-title">My Bookings</div><div class="empty-state-sub">${msg}</div><a href="/events/" class="btn btn-primary" style="margin:24px auto 0;display:inline-flex">Browse Events</a></div>`;
  el.style.display = 'block';
}

document.addEventListener('DOMContentLoaded', () => {
  checkAuth().then(() => loadBookings());
});
</script>
</body>
</html>
