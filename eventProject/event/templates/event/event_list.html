<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Discover and book tickets for amazing events near you. Live concerts, festivals, summits and more.">
  <title>EventHub — Discover Live Experiences</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <script>/* Apply theme before paint to avoid flash */
    (function(){var t=localStorage.getItem('eh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();
  </script>
</head>
<body>

<!-- Animated Background -->
<div class="page-bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<canvas id="particleCanvas"></canvas>

<!-- Floating Dock -->
<nav class="dock" id="mainDock">
  <span class="dock-logo">EventHub</span>
  <div class="dock-sep"></div>
  <a href="/events/" class="dock-item active" id="eventsLink">
    <span class="dock-icon">🎪</span>
    <span>Events</span>
  </a>
  <a href="/my-bookings/" class="dock-item" id="myBookingsBtn" style="display:none">
    <span class="dock-icon">🎟</span>
    <span>Bookings</span>
  </a>
  <a href="/admin-panel/dashboard/" class="dock-item dock-item-admin" id="adminDashboardBtn" style="display:none">
    <span class="dock-icon">⚡</span>
    <span>Admin</span>
  </a>
  <div class="dock-sep" id="authSep"></div>
  <a href="/login/" class="dock-item" id="loginLink">
    <span class="dock-icon">🔑</span>
    <span>Login</span>
  </a>
  <a href="/signup/" class="dock-item-primary" id="signupLink">✨ Sign Up</a>
  <button onclick="logout()" class="dock-item dock-item-danger" id="logoutBtn" style="display:none">
    <span class="dock-icon">👋</span>
    <span>Sign Out</span>
  </button>
  <div class="dock-sep"></div>
  <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()" title="Toggle light/dark mode" aria-label="Toggle theme">
    <span class="theme-toggle-icon theme-toggle-moon">🌙</span>
    <div class="theme-toggle-track"><div class="theme-toggle-thumb"></div></div>
    <span class="theme-toggle-icon theme-toggle-sun">☀️</span>
  </button>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="container">
    <div class="hero-eyebrow">Live Now · 2026</div>
    <h1 class="display hero-title">Discover <span>Unforgettable</span><br>Experiences</h1>
    <p class="hero-sub">Concerts, festivals, summits and more — book your spot before they sell out.</p>
    <div class="search-wrap" style="animation: fadeSlideUp 0.8s cubic-bezier(.34,1.56,.64,1) 0.4s both">
      <input type="text" id="searchInput" class="search-input" placeholder="Search events, artists, venues..." oninput="filterEvents()" autocomplete="off">
    </div>
  </div>
</section>

<!-- Events Section -->
<section class="section" style="padding-top:0">
  <div class="container">

    <!-- Trending Section -->
    <div id="trendingSectionWrap" style="display:none; margin-bottom: 56px;">
      <div class="section-heading reveal">
        <div class="section-heading-label">Hot Right Now</div>
        <h2>🔥 Trending Events</h2>
      </div>
      <div id="trendingContainer" class="hide-scrollbar" style="display: flex; gap: 24px; overflow-x: auto; padding-bottom: 16px; scroll-snap-type: x mandatory; margin: 0 -16px; padding-left: 16px; padding-right: 16px;">
        <!-- Trending cards go here -->
      </div>
    </div>

    <!-- Section heading for all events -->
    <div class="section-heading reveal">
      <div class="section-heading-label" id="allEventsLabel">Discover</div>
      <h2 id="allEventsTitle">Upcoming Events</h2>
    </div>

    <!-- Skeleton loader -->
    <div id="skeletonGrid" class="grid-auto">
      <div class="skeleton-card" style="opacity:0.9">
        <div class="skeleton skeleton-img"></div>
        <div class="skeleton-body"><div class="skeleton skeleton-line-sm"></div><div class="skeleton skeleton-line-lg"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
      </div>
      <div class="skeleton-card" style="opacity:0.6">
        <div class="skeleton skeleton-img"></div>
        <div class="skeleton-body"><div class="skeleton skeleton-line-sm"></div><div class="skeleton skeleton-line-lg"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
      </div>
      <div class="skeleton-card" style="opacity:0.3">
        <div class="skeleton skeleton-img"></div>
        <div class="skeleton-body"><div class="skeleton skeleton-line-sm"></div><div class="skeleton skeleton-line-lg"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
      </div>
    </div>

    <!-- Events grid -->
    <div id="eventsContainer" style="display:none"></div>

    <!-- Error / empty -->
    <div id="errorContainer" style="display:none"></div>

    <!-- Pagination -->
    <div id="paginationWrap" style="display:none">
      <p class="pagination-info" id="paginationInfo"></p>
      <div class="pagination">
        <button id="prevBtn" class="btn-page" onclick="loadPage(currentPage - 1)">← Prev</button>
        <span class="page-numbers" id="pageNumbers"></span>
        <button id="nextBtn" class="btn-page" onclick="loadPage(currentPage + 1)">Next →</button>
      </div>
    </div>
  </div>
</section>

<script>
/* ---- Theme Toggle ---- */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') !== 'light';
  const next = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('eh-theme', next);
}

/* ---- Particle System ---- */
(function() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.size = Math.random() * 1.5 + 0.3;
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.speedY = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.5 + 0.1;
      const colors = ['124,58,237', '236,72,153', '6,182,212', '167,139,250'];
      this.color = colors[Math.floor(Math.random() * colors.length)];
    }
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.color},${this.opacity})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < 80; i++) particles.push(new Particle());

  function animate() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });

    // draw connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(124,58,237,${0.08 * (1 - dist/120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

/* ---- Scroll Reveal ---- */
const observer = new IntersectionObserver((entries) => {
  entries.forEach((e, i) => {
    if (e.isIntersecting) {
      e.target.style.transitionDelay = `${i * 80}ms`;
      e.target.classList.add('visible');
    }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

/* ---- helpers ---- */
function gql(query, vars = {}, token = null) {
  const h = { 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = `JWT ${token}`;
  return fetch('/graphql/', { method:'POST', headers:h, body:JSON.stringify({query, variables:vars}) }).then(r=>r.json());
}

/* ---- auth bar ---- */
async function checkAuth() {
  const token = localStorage.getItem('access_token');
  const loginEl   = document.getElementById('loginLink');
  const signupEl  = document.getElementById('signupLink');
  const logoutEl  = document.getElementById('logoutBtn');
  const adminEl   = document.getElementById('adminDashboardBtn');
  const myBkEl    = document.getElementById('myBookingsBtn');
  const authSep   = document.getElementById('authSep');
  if (token) {
    if (loginEl)  loginEl.style.display  = 'none';
    if (signupEl) signupEl.style.display  = 'none';
    if (logoutEl) logoutEl.style.display  = 'flex';
    if (myBkEl)   myBkEl.style.display    = 'flex';
    if (authSep)  authSep.style.display   = 'block';
    try {
      const d = await gql('{ me { isStaff isSuperuser } }', {}, token);
      if (d.errors) { logout(); return; }
      const u = d.data && d.data.me;
      if (u && (u.isStaff || u.isSuperuser)) adminEl.style.display = 'flex';
    } catch(_) {}
  }
}
function logout() {
  localStorage.removeItem('access_token');
  localStorage.removeItem('refresh_token');
  location.reload();
}

/* ---- events ---- */
let currentPage = 1, totalPages = 1, totalCount = 0;
const PAGE_SIZE = 12;
let debounce;

function fmt(date) {
  if (!date) return 'TBA';
  return new Date(date + 'T00:00:00').toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtTime(t) {
  if (!t) return '';
  return new Date('1970-01-01T' + t).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true });
}

function eventCard(e, index, isTrending = false) {
  const cats = e.category && e.category.length ? e.category[0].name : '';
  const img  = e.featureImage
    ? `<img class="card-image" src="${e.featureImage}" alt="${e.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-image-placeholder><span>🎵</span><span>No image</span></div>'">`
    : `<div class="card-image-placeholder"><span>🎵</span><span>No image</span></div>`;
  const badge = isTrending ? `<div class="card-badge" style="position:absolute; top:12px; left:12px; background:linear-gradient(135deg, #ff3b30, #ff2d55); color:#fff; padding:6px 12px; border-radius:20px; font-size:0.75rem; font-weight:700; z-index:2; box-shadow: 0 4px 12px rgba(255,59,48,0.3); text-transform:uppercase; letter-spacing:0.5px;">Trending</div>` : '';
  
  return `
    <a href="/events/${e.slug}/" class="card reveal" style="text-decoration:none;transition-delay:${index * 60}ms; ${isTrending ? 'min-width: 300px; max-width: 300px; flex-shrink: 0; scroll-snap-align: start;' : ''}">
      <div class="card-image-wrap">
        ${badge}
        ${img}
        <div class="card-image-overlay"></div>
      </div>
      <div class="card-body">
        ${cats ? `<span class="card-category">${cats}</span>` : ''}
        <h3 class="card-title">${e.title || 'Untitled'}</h3>
        <p class="card-desc">${e.shortDescription || ''}</p>
        <hr class="card-divider">
        <div class="card-meta">
          <div class="card-meta-row"><span class="card-meta-label">Date</span><span class="card-meta-value">${fmt(e.eventDate)}</span></div>
          <div class="card-meta-row"><span class="card-meta-label">Time</span><span class="card-meta-value">${e.startTime ? fmtTime(e.startTime) : 'TBA'}</span></div>
          <div class="card-meta-row"><span class="card-meta-label">Location</span><span class="card-meta-value" style="text-align:right">${[e.city?.name, e.state?.name].filter(Boolean).join(', ')}</span></div>
        </div>
        <div class="card-footer">
          <span class="card-views">👁 ${e.viewsCount || 0}</span>
          <span class="card-cta">View Details <span class="card-cta-arrow">→</span></span>
        </div>
      </div>
    </a>`;
}

async function loadEvents(page = 1) {
  currentPage = page;
  const search = document.getElementById('searchInput').value.trim() || null;
  const token  = localStorage.getItem('access_token');

  document.getElementById('skeletonGrid').style.display   = 'grid';
  document.getElementById('eventsContainer').style.display = 'none';
  document.getElementById('errorContainer').style.display  = 'none';
  document.getElementById('paginationWrap').style.display  = 'none';

  try {
    const d = await gql(`
      query($page:Int,$pageSize:Int,$search:String){
        paginatedActiveEvents(page:$page,pageSize:$pageSize,search:$search){
          results{ id title slug shortDescription eventDate startTime featureImage viewsCount city{name} state{name} category{name} }
          totalCount numPages currentPage
        }
      }
    `, { page, pageSize: PAGE_SIZE, search }, token);

    document.getElementById('skeletonGrid').style.display = 'none';

    if (search) {
      document.getElementById('allEventsTitle').textContent = 'Search Results';
      document.getElementById('allEventsLabel').textContent = 'Found';
    } else {
      document.getElementById('allEventsTitle').textContent = 'Upcoming Events';
      document.getElementById('allEventsLabel').textContent = 'Discover';
    }

    if (d.errors) { showError('Failed to load events. Please try again.'); return; }

    const pg     = d.data.paginatedActiveEvents;
    totalCount   = pg.totalCount;
    totalPages   = pg.numPages;
    currentPage  = pg.currentPage;

    if (!pg.results || pg.results.length === 0) {
      showEmpty(search);
      return;
    }

    const container = document.getElementById('eventsContainer');
    container.innerHTML = `<div class="grid-auto">${pg.results.map((e, i) => eventCard(e, i)).join('')}</div>`;
    container.style.display = 'block';

    // trigger reveal on new cards
    container.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    if (totalPages > 1) {
      const start = ((currentPage - 1) * PAGE_SIZE) + 1;
      const end   = Math.min(currentPage * PAGE_SIZE, totalCount);
      document.getElementById('paginationInfo').textContent = `Showing ${start}–${end} of ${totalCount} events`;
      document.getElementById('pageNumbers').textContent    = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('prevBtn').disabled           = currentPage <= 1;
      document.getElementById('nextBtn').disabled           = currentPage >= totalPages;
      document.getElementById('paginationWrap').style.display = 'block';
    }
  } catch(err) {
    document.getElementById('skeletonGrid').style.display = 'none';
    showError('Network error. Please check your connection.');
  }
}

function showError(msg) {
  const el = document.getElementById('errorContainer');
  el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Something went wrong</div><div class="empty-state-sub">${msg}</div><button class="btn btn-secondary" style="margin:24px auto 0" onclick="loadEvents(1)">Try Again</button></div>`;
  el.style.display = 'block';
}

function showEmpty(search) {
  const el = document.getElementById('errorContainer');
  el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🎪</div><div class="empty-state-title">${search ? 'No events found' : 'No upcoming events'}</div><div class="empty-state-sub">${search ? `No results for "${search}". Try a different search.` : 'Check back soon for new events!'}</div></div>`;
  el.style.display = 'block';
}

function loadPage(page) {
  if (page >= 1 && page <= totalPages) {
    window.scrollTo({ top: 0, behavior:'smooth' });
    loadEvents(page);
  }
}

function filterEvents() {
  clearTimeout(debounce);
  debounce = setTimeout(() => loadEvents(1), 350);
}

async function loadTrendingEvents() {
  const token = localStorage.getItem('access_token');
  try {
    const d = await gql(`
      query {
        trendingEvents {
          id title slug shortDescription eventDate startTime featureImage viewsCount city{name} state{name} category{name}
        }
      }
    `, {}, token);
    
    if (d.errors || !d.data.trendingEvents || d.data.trendingEvents.length === 0) {
      document.getElementById('trendingSectionWrap').style.display = 'none';
      return;
    }
    
    const trending = d.data.trendingEvents;
    const container = document.getElementById('trendingContainer');
    container.innerHTML = trending.map((e, i) => eventCard(e, i, true)).join('');
    document.getElementById('trendingSectionWrap').style.display = 'block';
    
    // Trigger reveals for trending cards
    container.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  } catch(err) {
    document.getElementById('trendingSectionWrap').style.display = 'none';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  checkAuth();
  loadTrendingEvents();
  loadEvents();
});
</script>
</body>
</html>
