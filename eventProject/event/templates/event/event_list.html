<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Discover and book tickets for amazing events near you. Live concerts, festivals, summits and more.">
  <title>EventHub — Discover Live Experiences</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

<!-- Navigation -->
<nav class="nav">
  <div class="container nav-inner">
    <a href="/events/" class="nav-logo">EventHub</a>
    <div class="nav-links">
      <a href="/admin-panel/dashboard/" class="nav-link nav-link-admin" id="adminDashboardBtn" style="display:none">⚡ Admin</a>
      <a href="/login/" class="nav-link" id="loginLink">Login</a>
      <a href="/signup/" class="nav-link-primary" id="signupLink">Sign Up</a>
      <button onclick="logout()" class="nav-link nav-link-danger" id="logoutBtn" style="display:none">Sign Out</button>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="container">
    <div class="hero-eyebrow">Live Now · 2026</div>
    <h1 class="display hero-title">Discover <span>Unforgettable</span><br>Experiences</h1>
    <p class="hero-sub">Concerts, festivals, summits and more — book your spot before they sell out.</p>
    <div class="search-wrap">
      <input type="text" id="searchInput" class="search-input" placeholder="Search events, artists, venues..." oninput="filterEvents()" autocomplete="off">
    </div>
  </div>
</section>

<!-- Events Section -->
<section class="section" style="padding-top:0">
  <div class="container">

    <!-- Skeleton loader -->
    <div id="skeletonGrid" class="grid-auto">
      <div class="skeleton-card" style="opacity:0.8">
        <div class="skeleton skeleton-img"></div>
        <div class="skeleton-body"><div class="skeleton skeleton-line-sm"></div><div class="skeleton skeleton-line-lg"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
      </div>
      <div class="skeleton-card" style="opacity:0.6">
        <div class="skeleton skeleton-img"></div>
        <div class="skeleton-body"><div class="skeleton skeleton-line-sm"></div><div class="skeleton skeleton-line-lg"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
      </div>
      <div class="skeleton-card" style="opacity:0.4">
        <div class="skeleton skeleton-img"></div>
        <div class="skeleton-body"><div class="skeleton skeleton-line-sm"></div><div class="skeleton skeleton-line-lg"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
      </div>
    </div>

    <!-- Events grid -->
    <div id="eventsContainer" style="display:none"></div>

    <!-- Error / empty -->
    <div id="errorContainer" style="display:none"></div>

    <!-- Pagination -->
    <div id="paginationWrap" style="display:none">
      <p class="pagination-info" id="paginationInfo"></p>
      <div class="pagination">
        <button id="prevBtn" class="btn-page" onclick="loadPage(currentPage - 1)">← Prev</button>
        <span class="page-numbers" id="pageNumbers"></span>
        <button id="nextBtn" class="btn-page" onclick="loadPage(currentPage + 1)">Next →</button>
      </div>
    </div>
  </div>
</section>

<script>
  /* ---- helpers ---- */
  function gql(query, vars = {}, token = null) {
    const h = { 'Content-Type': 'application/json' };
    if (token) h['Authorization'] = `JWT ${token}`;
    return fetch('/graphql/', { method:'POST', headers:h, body:JSON.stringify({query, variables:vars}) }).then(r=>r.json());
  }

  /* ---- auth bar ---- */
  async function checkAuth() {
    const token = localStorage.getItem('access_token');
    const loginEl   = document.getElementById('loginLink');
    const signupEl  = document.getElementById('signupLink');
    const logoutEl  = document.getElementById('logoutBtn');
    const adminEl   = document.getElementById('adminDashboardBtn');
    if (token) {
      if (loginEl)  loginEl.style.display  = 'none';
      if (signupEl) signupEl.style.display  = 'none';
      if (logoutEl) logoutEl.style.display  = 'inline-flex';
      try {
        const d = await gql('{ me { isStaff isSuperuser } }', {}, token);
        const u = d.data && d.data.me;
        if (u && (u.isStaff || u.isSuperuser)) adminEl.style.display = 'inline-flex';
      } catch(_) {}
    }
  }
  function logout() {
    localStorage.removeItem('access_token');
    localStorage.removeItem('refresh_token');
    location.reload();
  }

  /* ---- events ---- */
  let currentPage = 1, totalPages = 1, totalCount = 0;
  const PAGE_SIZE = 12;
  let debounce;

  function fmt(date) {
    if (!date) return 'TBA';
    return new Date(date + 'T00:00:00').toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  }
  function fmtTime(t) {
    if (!t) return '';
    return new Date('1970-01-01T' + t).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true });
  }

  function eventCard(e) {
    const cats = e.category && e.category.length ? e.category[0].name : '';
    const img  = e.featureImage
      ? `<img class="card-image" src="${e.featureImage}" alt="${e.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-image-placeholder><span>🎵</span><span>No image</span></div>'">`
      : `<div class="card-image-placeholder"><span>🎵</span><span>No image</span></div>`;
    return `
      <a href="/events/${e.slug}/" class="card" style="text-decoration:none">
        <div class="card-image-wrap">${img}</div>
        <div class="card-body">
          ${cats ? `<span class="card-category">${cats}</span>` : ''}
          <h3 class="card-title">${e.title || 'Untitled'}</h3>
          <p class="card-desc">${e.shortDescription || ''}</p>
          <hr class="card-divider">
          <div class="card-meta">
            <div class="card-meta-row"><span class="card-meta-label">Date</span><span class="card-meta-value">${fmt(e.eventDate)}</span></div>
            <div class="card-meta-row"><span class="card-meta-label">Time</span><span class="card-meta-value">${e.startTime ? fmtTime(e.startTime) : 'TBA'}</span></div>
            <div class="card-meta-row"><span class="card-meta-label">Location</span><span class="card-meta-value" style="text-align:right">${[e.city?.name, e.state?.name].filter(Boolean).join(', ')}</span></div>
          </div>
          <div class="card-footer">
            <span class="card-views">👁 ${e.viewsCount || 0}</span>
            <span class="card-cta">View Details <span class="card-cta-arrow">→</span></span>
          </div>
        </div>
      </a>`;
  }

  async function loadEvents(page = 1) {
    currentPage = page;
    const search = document.getElementById('searchInput').value.trim() || null;
    const token  = localStorage.getItem('access_token');

    document.getElementById('skeletonGrid').style.display   = 'grid';
    document.getElementById('eventsContainer').style.display = 'none';
    document.getElementById('errorContainer').style.display  = 'none';
    document.getElementById('paginationWrap').style.display  = 'none';

    try {
      const d = await gql(`
        query($page:Int,$pageSize:Int,$search:String){
          paginatedActiveEvents(page:$page,pageSize:$pageSize,search:$search){
            results{ id title slug shortDescription eventDate startTime featureImage viewsCount city{name} state{name} category{name} }
            totalCount numPages currentPage
          }
        }
      `, { page, pageSize: PAGE_SIZE, search }, token);

      document.getElementById('skeletonGrid').style.display = 'none';

      if (d.errors) { showError('Failed to load events. Please try again.'); return; }

      const pg     = d.data.paginatedActiveEvents;
      totalCount   = pg.totalCount;
      totalPages   = pg.numPages;
      currentPage  = pg.currentPage;

      if (!pg.results || pg.results.length === 0) {
        showEmpty(search);
        return;
      }

      const container = document.getElementById('eventsContainer');
      container.innerHTML = `<div class="grid-auto">${pg.results.map(eventCard).join('')}</div>`;
      container.style.display = 'block';

      if (totalPages > 1) {
        const start = ((currentPage - 1) * PAGE_SIZE) + 1;
        const end   = Math.min(currentPage * PAGE_SIZE, totalCount);
        document.getElementById('paginationInfo').textContent = `Showing ${start}–${end} of ${totalCount} events`;
        document.getElementById('pageNumbers').textContent    = `Page ${currentPage} of ${totalPages}`;
        document.getElementById('prevBtn').disabled           = currentPage <= 1;
        document.getElementById('nextBtn').disabled           = currentPage >= totalPages;
        document.getElementById('paginationWrap').style.display = 'block';
      }
    } catch(err) {
      document.getElementById('skeletonGrid').style.display = 'none';
      showError('Network error. Please check your connection.');
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorContainer');
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Something went wrong</div><div class="empty-state-sub">${msg}</div><button class="btn btn-secondary" style="margin:24px auto 0" onclick="loadEvents(1)">Try Again</button></div>`;
    el.style.display = 'block';
  }

  function showEmpty(search) {
    const el = document.getElementById('errorContainer');
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🎪</div><div class="empty-state-title">${search ? 'No events found' : 'No upcoming events'}</div><div class="empty-state-sub">${search ? `No results for "${search}". Try a different search.` : 'Check back soon for new events!'}</div></div>`;
    el.style.display = 'block';
  }

  function loadPage(page) {
    if (page >= 1 && page <= totalPages) {
      window.scrollTo({ top: 0, behavior:'smooth' });
      loadEvents(page);
    }
  }

  function filterEvents() {
    clearTimeout(debounce);
    debounce = setTimeout(() => loadEvents(1), 350);
  }

  document.addEventListener('DOMContentLoaded', () => {
    checkAuth();
    loadEvents();
  });
</script>
</body>
</html>
